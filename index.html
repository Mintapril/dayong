<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#171210">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="180x180" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="大雍社稷">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>大雍·社稷 贰</title>
<style>
:root{
  --bg:#171210; --panel:#262017; --panel2:#2e2619;
  --ink:#e9dcc0; --ink-dim:#9c8f78; --ink-faint:#6f6353;
  --gold:#c9a455; --gold-dim:#8a7340; --gold-bright:#e8c87a;
  --cinnabar:#c0443a; --cinnabar-bright:#e05c50;
  --paper:#282115; --paper2:#211b11; --paper-ink:#dccfb0;
  --f-gentry:#9d7bbf; --f-scholar:#6b9ab3; --f-eunuch:#c08a3e; --f-consort:#c4708c; --f-army:#7e9064;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse 130% 55% at 50% -8%, rgba(201,164,85,.07), transparent 60%);
  color:var(--ink);
  font-family:"Songti SC","STSong","SimSun","Noto Serif CJK SC",serif;
  font-size:15px;line-height:1.6;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  height:100dvh;overflow:hidden;display:flex;flex-direction:column;
}
.kai{font-family:"Kaiti SC","STKaiti","KaiTi","Songti SC",serif}

/* ===== 顶栏 ===== */
#top{flex:0 0 auto;padding:calc(env(safe-area-inset-top) + 6px) 14px 4px;text-align:center}
#orbs{display:flex;justify-content:center;gap:18px}
.orb{position:relative;width:46px}
.orb .ob-label{font-size:10px;color:var(--ink-faint);letter-spacing:1px;display:block;margin-top:-3px}
.orb .ob-delta{position:absolute;top:-4px;right:-8px;font-size:12px;font-weight:700;opacity:0;pointer-events:none}
.orb .ob-delta.show{animation:odp 1.5s ease forwards}
@keyframes odp{0%{opacity:0;transform:translateY(5px)}18%{opacity:1;transform:none}75%{opacity:1}100%{opacity:0;transform:translateY(-7px)}}
.orb.pulse svg{animation:opulse .5s ease}
@keyframes opulse{40%{transform:scale(1.18)}}
.d-up{color:#9fc99a}.d-dn{color:var(--cinnabar-bright)}
#era-row{margin-top:2px;font-size:13px;color:var(--gold-bright);letter-spacing:2px}
#era-row .sub{color:var(--ink-faint);font-size:11px;letter-spacing:1px;margin-left:8px}
#qbar{margin-top:3px;font-size:11px;color:#b9a06a;letter-spacing:1px;min-height:15px}
#qbar .qchip{border:1px solid #4a3c22;border-radius:99px;padding:1px 9px;background:rgba(201,164,85,.07)}
#llm-dot{cursor:pointer;padding:4px 2px;position:absolute;top:calc(env(safe-area-inset-top) + 8px);right:12px;font-size:9px;color:var(--ink-faint);letter-spacing:1px;display:flex;align-items:center;gap:4px}
#llm-dot i{width:6px;height:6px;border-radius:50%;background:#5d6b4a;display:inline-block}
#llm-dot.off i{background:#6f6353}
#llm-dot.busy i{background:var(--gold);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}

/* ===== 结果浮条 ===== */
#rstrip{position:fixed;left:50%;transform:translateX(-50%);top:calc(env(safe-area-inset-top) + 96px);z-index:30;
  max-width:88vw;background:rgba(30,24,17,.94);border:1px solid #4a3c22;border-radius:10px;
  padding:7px 13px;font-size:12.5px;color:var(--ink);line-height:1.6;pointer-events:none;opacity:0;transition:opacity .3s}
#rstrip.show{opacity:1}

/* ===== 卡舞台 ===== */
#stage{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;padding:4px 0 0;min-height:0}
#choices{display:flex;justify-content:space-between;width:min(92vw,420px);gap:8px;padding:2px 2px 6px;min-height:58px}
.ch{flex:1;max-width:48%;opacity:.45;transition:opacity .15s, transform .15s;text-align:center}
.ch .ch-txt{font-size:13px;color:var(--ink);background:var(--panel);border:1px solid #443720;border-radius:10px;padding:5px 8px;line-height:1.45;display:block}
.ch .ch-hint{font-size:11px;letter-spacing:1px;margin-top:3px;min-height:14px}
.ch.lit{opacity:1;transform:translateY(-2px)}
.ch.lit .ch-txt{border-color:var(--gold-dim);color:var(--gold-bright)}
#ch-l .ch-txt::before{content:"‹ ";color:var(--ink-faint);font-size:11px}
#ch-r .ch-txt::after{content:" ›";color:var(--ink-faint);font-size:11px}
.ch.single{max-width:70%;margin:0 auto}
.hint-up{color:#8fb98a}.hint-dn{color:#cf7a6e}.hint-q{color:var(--gold-bright)}

#card-area{position:relative;width:min(80vw,330px);flex:1 1 auto;max-height:62dvh;min-height:300px}
#card-shadow{position:absolute;inset:6px -4px -6px 4px;border-radius:14px;background:#100c08;opacity:.6}
.gcard{
  position:absolute;inset:0;border-radius:14px;overflow:hidden;
  background:linear-gradient(178deg,var(--paper),var(--paper2));
  border:1px solid #46391f;
  box-shadow:0 10px 34px rgba(0,0,0,.55);
  display:flex;flex-direction:column;
  touch-action:none;cursor:grab;will-change:transform;
}
.gcard.snap{transition:transform .22s cubic-bezier(.2,.8,.3,1)}
.gcard.fly{transition:transform .34s cubic-bezier(.4,0,.8,.4), opacity .34s}
.gcard .c-portrait{flex:0 0 auto;height:46%;background:#221a12;position:relative}
.gcard .c-portrait svg{width:100%;height:100%;display:block}
.gcard .c-edge{height:8px;background:repeating-linear-gradient(90deg,#8d6c24 0 13px,#75591d 13px 26px);opacity:.85}
.gcard .c-plate{padding:7px 13px 0;display:flex;justify-content:space-between;align-items:baseline}
.gcard .c-name{font-family:"Kaiti SC","STKaiti","KaiTi",serif;font-size:16px;font-weight:700;color:#eedfb8;letter-spacing:1px}
.gcard .c-sub{font-size:10.5px;color:#95845e;letter-spacing:1px}
.gcard .c-body{flex:1 1 auto;overflow:hidden;padding:5px 14px 10px;font-size:13.5px;line-height:1.75;color:var(--paper-ink);white-space:pre-line}
.gcard .c-title{position:absolute;top:8px;left:10px;background:rgba(20,15,10,.55);color:var(--gold-bright);
  font-family:"Kaiti SC","STKaiti","KaiTi",serif;font-size:13px;letter-spacing:2px;padding:2px 9px;border-radius:8px;backdrop-filter:blur(2px)}
.gcard .c-tag{position:absolute;top:8px;right:10px;font-size:10px;letter-spacing:1px;padding:2px 8px;border-radius:99px;color:#fff;opacity:.9}
.gcard.note-card .c-body{font-size:14px}
.gcard .c-stamp{position:absolute;right:10px;bottom:10px;width:54px;height:54px;border:3.5px solid var(--cinnabar-bright);border-radius:8px;
  color:var(--cinnabar-bright);display:flex;align-items:center;justify-content:center;
  font-family:"Kaiti SC","STKaiti","KaiTi",serif;font-size:28px;font-weight:900;transform:rotate(-9deg);
  background:rgba(224,92,80,.09);opacity:0;pointer-events:none}
.gcard .c-stamp.on{animation:stmp .42s cubic-bezier(.3,1.5,.4,1) forwards}
@keyframes stmp{0%{opacity:0;transform:rotate(-9deg) scale(2.2)}60%{opacity:1;transform:rotate(-9deg) scale(.94)}100%{opacity:1;transform:rotate(-9deg) scale(1)}}
.c-portrait .p-tap{position:absolute;left:8px;bottom:6px;font-size:10px;color:#a8987a;letter-spacing:1px;background:rgba(20,15,10,.5);padding:1px 7px;border-radius:99px}
#under-hint{font-size:11px;color:var(--ink-faint);letter-spacing:2px;padding:4px 0 2px;min-height:20px}

/* ===== 国势抽屉 ===== */
#pull{flex:0 0 auto;text-align:center;padding:4px 0 calc(env(safe-area-inset-bottom) + 7px);color:var(--ink-faint);font-size:11.5px;letter-spacing:3px;cursor:pointer}
#pull::before{content:"";display:block;width:42px;height:4px;border-radius:2px;background:#3f3424;margin:0 auto 4px}
#panel{position:fixed;inset:0;z-index:50;background:rgba(10,8,5,.6);display:none}
#panel.on{display:block}
#panel-in{position:absolute;left:0;right:0;bottom:0;height:88dvh;background:#1d1710;border-top:1px solid #4a3c22;
  border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:pup .3s cubic-bezier(.2,.8,.3,1)}
@keyframes pup{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
#panel-head{flex:0 0 auto;text-align:center;padding:10px 0 6px;position:relative}
#panel-head::before{content:"";display:block;width:42px;height:4px;border-radius:2px;background:#4a3c22;margin:0 auto 7px}
#panel-tabs{display:flex;justify-content:center;gap:6px}
.ptab{font-size:12.5px;letter-spacing:2px;color:var(--ink-faint);padding:4px 13px;border:1px solid transparent;border-radius:99px;cursor:pointer}
.ptab.on{color:var(--gold-bright);border-color:#4a3c22;background:rgba(201,164,85,.06)}
#panel-body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px calc(env(safe-area-inset-bottom) + 18px)}
h3.sec{font-size:12px;color:var(--gold);letter-spacing:3px;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
h3.sec::before,h3.sec::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold-dim))}
h3.sec::after{background:linear-gradient(90deg,var(--gold-dim),transparent)}
.fac-row{background:var(--panel);border:1px solid #3a2f1e;border-radius:10px;padding:8px 11px;margin-bottom:7px}
.fac-top{display:flex;justify-content:space-between;align-items:baseline}
.fac-name{font-size:14px;font-weight:700;letter-spacing:1px}
.fbar{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--ink-faint);margin-top:5px}
.fbar .track{flex:1;height:5px;background:#15110c;border-radius:3px;overflow:hidden}
.fbar .track i{display:block;height:100%;border-radius:3px}
.fac-tag{font-size:10px;padding:1px 7px;border-radius:99px;border:1px solid #6e3530;color:var(--cinnabar-bright);margin-left:6px}
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px}
.ro{background:var(--panel);border:1px solid #3a2f1e;border-radius:10px;padding:7px;display:flex;gap:8px;align-items:center;cursor:pointer}
.ro:active{border-color:var(--gold-dim)}
.ro .ro-p{width:46px;height:50px;border-radius:7px;overflow:hidden;flex:0 0 auto;background:#221a12}
.ro .ro-p svg{width:100%;height:100%}
.ro .ro-t{font-size:10px;color:var(--gold);letter-spacing:1px}
.ro .ro-n{font-size:13.5px;font-weight:700;line-height:1.3}
.ro .ro-m{font-size:10px;color:var(--ink-dim);line-height:1.4}
.stars{color:var(--gold);font-size:10px;letter-spacing:1px}
.tag-warn{color:var(--cinnabar-bright)}
.pal-card{background:var(--panel);border:1px solid #3a2f1e;border-radius:10px;padding:9px 12px;margin-bottom:7px;font-size:13px}
.pal-sub{font-size:11px;color:var(--ink-dim);margin-top:2px}
.crown{color:var(--gold-bright);font-size:10px;border:1px solid var(--gold-dim);border-radius:99px;padding:0 6px;letter-spacing:1px}
.hist{border-left:2px solid #3a2f1e;margin-left:6px;padding-left:12px}
.h-year{font-size:11.5px;color:var(--gold);letter-spacing:2px;margin:12px 0 3px;position:relative}
.h-year::before{content:"";position:absolute;left:-17px;top:5px;width:7px;height:7px;border-radius:50%;background:var(--gold-dim)}
.h-item{font-size:12.5px;color:var(--ink-dim);margin:3px 0;line-height:1.65}
.h-item.whisper::before{content:"密 ";color:var(--cinnabar);font-size:10px;border:1px solid #5a3530;border-radius:3px;padding:0 3px;margin-right:4px}
.h-item.big{color:var(--gold-bright)}
.h-item.bad{color:var(--cinnabar-bright)}
.small-dim{font-size:11.5px;color:var(--ink-faint);text-align:center;letter-spacing:1px;margin:8px 0}

/* ===== 召对底页 ===== */
#sheet{position:fixed;inset:0;z-index:60;background:rgba(10,8,5,.7);display:none;align-items:flex-end}
#sheet.on{display:flex}
#sheet-in{width:100%;max-height:80dvh;background:#221b13;border-top:1px solid #4a3c22;border-radius:18px 18px 0 0;
  display:flex;flex-direction:column;animation:pup .28s cubic-bezier(.2,.8,.3,1)}
#sheet-head{flex:0 0 auto;display:flex;gap:10px;align-items:center;padding:14px 16px 8px}
#sheet-head .sh-p{width:56px;height:62px;border-radius:9px;overflow:hidden;background:#221a12;flex:0 0 auto}
#sheet-head .sh-p svg{width:100%;height:100%}
#sheet-head .sh-n{font-size:16px;font-weight:700}
#sheet-head .sh-m{font-size:11px;color:var(--ink-dim);margin-top:2px}
#sheet-close{margin-left:auto;color:var(--ink-faint);font-size:20px;padding:4px 10px;cursor:pointer}
#sheet-log{flex:1 1 auto;overflow-y:auto;padding:6px 16px;min-height:120px}
.msg{margin:7px 0;display:flex}
.msg .bub{max-width:82%;padding:8px 12px;border-radius:12px;font-size:13.5px;line-height:1.7;white-space:pre-line}
.msg.me{justify-content:flex-end}
.msg.me .bub{background:#3a2e1a;border:1px solid var(--gold-dim);color:var(--gold-bright);border-radius:12px 12px 3px 12px}
.msg.him .bub{background:var(--panel);border:1px solid #3a2f1e;color:var(--ink);border-radius:12px 12px 12px 3px}
.msg.sys .bub{background:none;border:none;color:var(--ink-faint);font-size:11.5px;margin:0 auto}
#sheet-input{flex:0 0 auto;display:flex;gap:8px;padding:8px 14px calc(env(safe-area-inset-bottom) + 12px)}
#sheet-input input{flex:1;background:#15100b;border:1px solid #443720;border-radius:10px;color:var(--ink);
  font-family:inherit;font-size:14px;padding:10px 12px;outline:none}
#sheet-input input:focus{border-color:var(--gold-dim)}
#sheet-input button{flex:0 0 auto;background:linear-gradient(180deg,#3a2e1a,#2c2314);border:1px solid var(--gold-dim);
  color:var(--gold-bright);font-family:"Kaiti SC","STKaiti","KaiTi",serif;font-size:15px;letter-spacing:2px;
  padding:0 18px;border-radius:10px;cursor:pointer}
#sheet-input button:disabled{opacity:.4}

/* ===== 全屏幕间 ===== */
#screen{position:fixed;inset:0;z-index:70;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:26px 22px;text-align:center;overflow-y:auto}
#screen.on{display:flex}
#screen .sc-glyph{font-family:"Kaiti SC","STKaiti","KaiTi",serif;font-size:60px;color:var(--cinnabar);line-height:1;margin-bottom:12px;text-shadow:0 0 30px rgba(192,68,58,.3)}
#screen .sc-glyph.gold{color:var(--gold-bright);text-shadow:0 0 30px rgba(201,164,85,.35)}
#screen h1{font-family:"Kaiti SC","STKaiti","KaiTi",serif;font-size:28px;letter-spacing:7px;margin-bottom:5px}
#screen .sc-sub{font-size:12.5px;color:var(--ink-dim);letter-spacing:2px;margin-bottom:16px}
#screen .sc-body{font-size:14px;line-height:2;max-width:480px;text-align:left;white-space:pre-line;margin-bottom:8px}
.btn{display:block;width:100%;max-width:320px;margin:16px auto 0;background:linear-gradient(180deg,#3a2e1a,#2c2314);
  border:1px solid var(--gold-dim);color:var(--gold-bright);font-size:15px;letter-spacing:4px;padding:12px;border-radius:10px;
  font-family:"Kaiti SC","STKaiti","KaiTi",serif;cursor:pointer;min-height:48px}
.btn:active{transform:scale(.985)}
.btn.ghost{background:transparent;border-color:#443720;color:var(--ink-dim);letter-spacing:2px;font-size:13px;min-height:40px}
#codex{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px;max-width:360px}
.cdx{width:64px;text-align:center}
.cdx .cdx-g{font-family:"Kaiti SC","STKaiti","KaiTi",serif;font-size:26px;color:var(--gold-dim);border:1px solid #3a2f1e;border-radius:10px;padding:8px 0;background:var(--panel)}
.cdx.locked .cdx-g{color:#3f372a}
.cdx .cdx-t{font-size:10px;color:var(--ink-faint);margin-top:3px;letter-spacing:1px}

/* ===== 接口设置 ===== */
#cfg{position:fixed;inset:0;z-index:75;background:rgba(10,8,5,.72);display:none;align-items:flex-end}
#cfg.on{display:flex}
#cfg-in{width:100%;max-height:88dvh;background:#221b13;border-top:1px solid #4a3c22;border-radius:18px 18px 0 0;
  display:flex;flex-direction:column;animation:pup .28s cubic-bezier(.2,.8,.3,1);overflow-y:auto}
#cfg-head{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;padding:14px 16px 4px}
#cfg-head .ct{font-size:16px;letter-spacing:3px;color:var(--gold-bright)}
#cfg-close{color:var(--ink-faint);font-size:22px;padding:2px 10px;cursor:pointer}
#cfg-body{padding:2px 16px calc(env(safe-area-inset-bottom) + 16px)}
.cf-row{margin:11px 0}
.cf-lab{display:block;font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:5px}
.cf-row input{width:100%;background:#15100b;border:1px solid #443720;border-radius:10px;color:var(--ink);
  font-family:inherit;font-size:13.5px;padding:10px 12px;outline:none;user-select:text;-webkit-user-select:text}
.cf-row input:focus{border-color:var(--gold-dim)}
.cf-seg{display:flex;gap:8px}
.seg{flex:1;text-align:center;font-size:13px;letter-spacing:1px;padding:9px 0;border:1px solid #443720;border-radius:10px;color:var(--ink-dim);cursor:pointer}
.seg.on{border-color:var(--gold-dim);color:var(--gold-bright);background:rgba(201,164,85,.07)}
#cfg-note{font-size:11px;color:var(--ink-faint);line-height:1.8;margin:9px 0 4px}
#cfg-stat{font-size:12px;min-height:19px;letter-spacing:1px;margin:2px 0 7px}
#cfg-stat.ok{color:#8fb98a}#cfg-stat.err{color:var(--cinnabar-bright)}
#cfg-btns{display:flex;gap:10px}
#cfg-btns .btn{margin:0;flex:1;min-height:44px;font-size:14px;letter-spacing:2px}

.toast{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 96px);transform:translateX(-50%);z-index:80;
  background:rgba(34,27,19,.95);border:1px solid var(--gold-dim);color:var(--gold-bright);
  font-size:12.5px;letter-spacing:1px;padding:7px 15px;border-radius:99px;pointer-events:none;
  animation:toastin 2.2s ease forwards;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
@keyframes toastin{0%{opacity:0;transform:translate(-50%,-8px)}12%{opacity:1;transform:translate(-50%,0)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-6px)}}
@media (prefers-reduced-motion: reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}
</style>
</head>
<body>

<div id="top">
  <div id="orbs">
    <div class="orb" id="orb-t"><span class="ob-svg"></span><span class="ob-label">国库</span><span class="ob-delta"></span></div>
    <div class="orb" id="orb-p"><span class="ob-svg"></span><span class="ob-label">民心</span><span class="ob-delta"></span></div>
    <div class="orb" id="orb-m"><span class="ob-svg"></span><span class="ob-label">军备</span><span class="ob-delta"></span></div>
    <div class="orb" id="orb-a"><span class="ob-svg"></span><span class="ob-label">皇权</span><span class="ob-delta"></span></div>
  </div>
  <div id="era-row"><span id="era-txt" class="kai">承光元年 · 春</span><span class="sub" id="era-sub"></span></div>
  <div id="qbar"></div>
  <div id="llm-dot" class="off"><i></i><span id="llm-txt">静态</span></div>
</div>

<div id="rstrip"></div>

<div id="stage">
  <div id="choices">
    <div class="ch" id="ch-l"><span class="ch-txt"></span><span class="ch-hint"></span></div>
    <div class="ch" id="ch-r"><span class="ch-txt"></span><span class="ch-hint"></span></div>
  </div>
  <div id="card-area">
    <div id="card-shadow"></div>
  </div>
  <div id="under-hint"></div>
</div>

<div id="pull">国　势</div>

<div id="panel"><div id="panel-in">
  <div id="panel-head"><div id="panel-tabs">
    <span class="ptab on" data-pt="court">朝堂</span>
    <span class="ptab" data-pt="pal">宫闱</span>
    <span class="ptab" data-pt="realm">邦交</span>
    <span class="ptab" data-pt="quest">国策</span>
    <span class="ptab" data-pt="hist">史册</span>
  </div></div>
  <div id="panel-body"></div>
</div></div>

<div id="sheet"><div id="sheet-in">
  <div id="sheet-head">
    <div class="sh-p"></div>
    <div><div class="sh-n kai"></div><div class="sh-m"></div></div>

/* ===== 大雍·社稷 贰 — SVG人像生成器 ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const SKIN=['#ecd0aa','#e4c298','#d9b287','#cba377'];
const HAIR_DARK='#2e2620', HAIR_GRAY='#b7afa0', HAIR_WHITE='#ddd6c8';
const HAT_BLACK='#211c18', METAL='#5a626a', GOLDL='#c9a455';
const FROBE={gentry:'#6f5588',scholar:'#4c7187',eunuch:'#8a6230',consort:'#94576c',army:'#5d6b4a',none:'#5a5246'};

function portraitSVG(spec){

  const female=!!spec.female;
  const skin=pk(SKIN);

  const robeD=shade(robe,-22), robeL=shade(robe,18);
  const hairC=old?(R()<.5?HAIR_WHITE:HAIR_GRAY):(mid&&R()<.4?HAIR_GRAY:HAIR_DARK);
  const o=[];
  /* 背景 */
  o.push(`<rect x="0" y="0" width="120" height="132" rx="8" fill="#221a12"/>`);
  o.push(`<ellipse cx="60" cy="60" rx="52" ry="56" fill="${shade(robe,-34)}" opacity=".5"/>`);
  /* 颈与袍 */
  o.push(`<rect x="52" y="62" width="16" height="22" fill="${shade(skin,-14)}"/>`);
  o.push(`<path d="M12,132 L19,98 Q32,82 60,80 Q88,82 101,98 L108,132 Z" fill="${robe}"/>`);
  o.push(`<path d="M46,84 L60,100 L74,84" fill="none" stroke="${robeD}" stroke-width="3"/>`);
  o.push(`<path d="M50,83 L60,94 L70,83" fill="none" stroke="${robeL}" stroke-width="2"/>`);
  if(spec.role==='war'){ /* 甲片 */
    o.push(`<path d="M30,100 H90 M26,112 H94 M23,124 H97" stroke="${robeD}" stroke-width="2.5" fill="none"/>`);
    o.push(`<circle cx="60" cy="104" r="3" fill="${GOLDL}"/>`);
  }else{
    o.push(`<path d="M22,116 Q60,108 98,116" stroke="${robeD}" stroke-width="2" fill="none" opacity=".8"/>`);
  }
  /* 头 */
  const faceW=ri(17,19), faceH=ri(20,22);
  o.push(`<ellipse cx="41" cy="52" rx="3.2" ry="5" fill="${shade(skin,-10)}"/>`);

  /* 鬓发(露发的角色之后被冠帽覆盖也无妨) */
  if(spec.role!=='monk') o.push(`<path d="M${60-faceW},48 Q${60-faceW},34 60,32 Q${60+faceW},34 ${60+faceW},48 Q60,${30+ri(6,9)} ${60-faceW},48 Z" fill="${hairC}" opacity=".95"/>`);
  /* 眉 */

  if(female){
    o.push(`<path d="M48,${browY} q4,-2.5 8,-1" stroke="${hairC}" stroke-width="1.6" fill="none" stroke-linecap="round"/>`);

  }else{
    const bv=pk(['q4,-2 8,-1','q4,1.5 8,2','q4,-3 8,-3']);

    o.push(`<path d="M72,${browY} q-4,${bv.includes('-3')?-3:bv.includes('1.5')?1.5:-2} -8,${bv.includes('-3')?-3:bv.includes('1.5')?2:-1}" stroke="${hairC}" stroke-width="${old?2:2.4}" fill="none" stroke-linecap="round"/>`);
  }
  /* 眼 */
  const eye=pk(female?['line','dot']:['dot','line','narrow']);

  }else if(eye==='line'){
    o.push(`<path d="M49,50 q4,2 8,0 M63,50 q4,2 8,0" stroke="#2a221c" stroke-width="1.8" fill="none" stroke-linecap="round"/>`);

  }else{
    o.push(`<path d="M49,49.4 l8,1.4 M71,49.4 l-8,1.4" stroke="#2a221c" stroke-width="2" stroke-linecap="round"/>`);

  if(old)o.push(`<path d="M48,55 q5,2 9,1 M63,56 q5,1 9,-1" stroke="${shade(skin,-22)}" stroke-width="1" fill="none"/>`);

  /* 须(先画须再画嘴) */
  let beard=spec.beard;
  if(beard===undefined){
    if(female||spec.role==='eunuch'||spec.role==='monk')beard='none';

  }
  if(beard==='mustache'||beard==='full'||beard==='long'){

  }
  if(beard==='goatee'){
    o.push(`<path d="M55.5,69 L64.5,69 L60,80 Z" fill="${bC}"/>`);
    o.push(`<path d="M52,62 q8,4.5 16,0" stroke="${bC}" stroke-width="2" fill="none" stroke-linecap="round"/>`);
  }
  /* 嘴 */
  const mouthY=(beard==='mustache'||beard==='full'||beard==='long')?67:65.5;
  const mv=spec.mood==='smile'?`M55,${mouthY-1} q5,3.5 10,0`:spec.mood==='frown'?`M55,${mouthY+1} q5,-3.5 10,0`:pk([`M55,${mouthY} h10`,`M55,${mouthY-.5} q5,2.5 10,0`,`M56,${mouthY} h8`]);
  o.push(`<path d="${mv}" stroke="${female?'#a8484f':'#3a2c22'}" stroke-width="${female?2.2:1.8}" fill="none" stroke-linecap="round"/>`);
  /* 冠帽 */
  o.push(hatFor(spec,R,hairC,robe));
  return `<svg viewBox="0 0 120 132" xmlns="http://www.w3.org/2000/svg">${o.join('')}</svg>`;
}

function hatFor(spec,R,hairC,robe){

  if(role==='lady'){
    return `<path d="M42,42 Q40,18 60,16 Q80,18 78,42 Q60,30 42,42 Z" fill="${hairC==='#2e2620'?hairC:'#2e2620'}"/>
      <circle cx="46" cy="19" r="6.2" fill="#2e2620"/><circle cx="74" cy="19" r="6.2" fill="#2e2620"/>
      <path d="M74,16 L86,27" stroke="${GOLDL}" stroke-width="1.4"/>
      <circle cx="86" cy="27" r="1.8" fill="${GOLDL}"/><circle cx="83" cy="31" r="1.2" fill="${GOLDL}"/>
      <circle cx="46" cy="15" r="2.6" fill="#c4708c"/><circle cx="42" cy="18" r="1.6" fill="#c4708c"/>
      <path d="M60,38 l2.6,2.8 -2.6,2.8 -2.6,-2.8 Z" fill="#c0443a"/>`;
  }
  if(role==='emperor'){
    return `<rect x="45" y="34" width="30" height="5" rx="1.5" fill="#2c2620" stroke="${GOLDL}" stroke-width=".8"/>
      <path d="M48,34 L50,9 L70,9 L72,34 Z" fill="#2c2620"/>
      <path d="M54,10 V34 M60,9.5 V34 M66,10 V34" stroke="${GOLDL}" stroke-width="1.1"/>
      <path d="M56,33 L60,25 L64,33 Z" fill="${GOLDL}"/>
      <path d="M40,37 H80" stroke="${GOLDL}" stroke-width="1.4"/>`;

  if(role==='monk'){

  }
  if(role==='daoist'){
    return `<path d="M44,40 Q60,27 76,40 Q60,33 44,40 Z" fill="${hairC}"/>

      <path d="M48,21 H72" stroke="#caa86a" stroke-width="1.6"/>`;

      <path d="M34,39 Q60,30 86,39" stroke="#7c6a3e" stroke-width="1.2" fill="none"/>

    return `<path d="M45,40 L47,21 L73,21 L75,40 Q60,33 45,40 Z" fill="#3a3128"/>
      <path d="M47,27 H73" stroke="#564a3c" stroke-width="1.4"/>
      <path d="M73,23 q7,4 6,12" stroke="#3a3128" stroke-width="3" fill="none"/>`;

  if(role==='envoy'){

    return `<path d="M44,40 Q44,23 60,23 Q76,23 76,40 Q60,33 44,40 Z" fill="#2c2620" stroke="#4a4034" stroke-width="1"/>
      <path d="M46,38 q-6,9 -4,18 M74,38 q6,9 4,18" stroke="#2c2620" stroke-width="4" fill="none" stroke-linecap="round"/>`;

  if(role==='physician'){
    return `<path d="M45,40 Q45,24 60,24 Q75,24 75,40 Q60,34 45,40 Z" fill="#37414a"/>
      <rect x="43" y="37.5" width="34" height="4" rx="2" fill="#2b333a"/>`;
  }
  return '';
}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

function orbSVG(k,val,size){

/* ---------- 工具 ---------- */

const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const chance=p=>Math.random()<p;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function cn(n){n=Math.floor(n);const D='一二三四五六七八九';
  if(n<=0)return '零';if(n<10)return D[n-1];
  if(n<20)return '十'+(n%10?D[n%10-1]:'');
  if(n<100)return D[Math.floor(n/10)-1]+'十'+(n%10?D[n%10-1]:'');return String(n);}
function yearCn(n){return n<=1?'元':cn(n);}

function makeName(faction){
  for(let i=0;i<50;i++){

const lastDelta={t:0,p:0,m:0,a:0};
let fxCollector=null;
function applyFx(fx){
  const out=[];
  if(!fx)return out;
  ['t','p','m','a'].forEach(k=>{
    if(fx[k]){const before=S[k];S[k]=clamp(S[k]+fx[k],0,100);
      const d=S[k]-before;if(d!==0){lastDelta[k]+=d;out.push({label:STAT_NAMES[k],val:d});}}
  });
  if(fx.f)for(const k in fx.f){
    const [dp,da]=fx.f[k];const F=S.factions[k];
    if(dp){F.power=clamp(F.power+dp,5,100);out.push({label:fname(k)+'·势力',val:dp});}
    if(da){F.attitude=clamp(F.attitude+da,0,100);out.push({label:fname(k)+'·恭顺',val:da});}
  }
  if(fx.r)for(const k in fx.r){
    const [dr,dm]=fx.r[k];const R=S.realms[k];
    if(dr){R.rel=clamp(R.rel+dr,0,100);out.push({label:rname(k)+'·邦交',val:dr});}
    if(dm){R.might=clamp(R.might+dm,15,95);out.push({label:rname(k)+'·国势',val:dm});}
  }
  if(fx.health){S.emperor.health=clamp(S.emperor.health+fx.health,0,100);out.push({label:'圣体',val:fx.health});}
  return out;
}
function fxc(fx){const r=applyFx(fx);if(fxCollector)fxCollector.push(...r);return r;}

}

function resolveOust(pm,desperate){
  const f=pm.faction;
  const ch=clamp(0.25+S.a/140+S.flags.prepRule*0.07-(S.factions[f].power-55)/250,0.12,0.9);
  if(chance(ch)){
    removeMinister(pm);S.flags.prepRule=0;
    fxc({a:12,f:{[f]:[-12,-8]}});
    addLog(`权相${pm.name}罢黜伏诛，朝野震肃。`,'big');
    return `禁军雷霆围府，${pm.name}就缚，赐死于狱。其党或诛或贬，权臣之患一朝而除。陛下乾纲独断，威权复振！`;
  }else{
    fxc({a:desperate?-16:-10,f:{[f]:[6,-10]}});
    S.factions[f].plot+=2;
    pm.loyalty=clamp(pm.loyalty-20,0,100);
    addLog(`罢相之诏不行，帝威大损。`,'bad');
    return `诏书未出宫门，已为${pm.name}所知！其党羽布列禁省，封还诏书，竟不奉行。次日${pm.name}入见，言笑如常，而陛下汗透重衣。`;
  }
}
function resolveCoup(k,mode){
  S.factions[k].plot=-4;
  let ok;
  if(mode==='awe'){ok=chance(clamp(0.2+S.a/150+(k!=='army'?S.factions.army.attitude/350:0),0.12,0.85));}

}

}
function endWar(outcome){
  const k=S.war.k,R=realm(k),score=S.war.score,defensive=S.war.defensive;
  R.war=false;R.truce=4;S.war=null;
  if(outcome==='win'){
    R.might=clamp(R.might-16,15,95);R.rel=52;
    fxc({a:10,m:3,p:3,t:6,f:{army:[5,4]}});
    let extra='';
    if(R.might<42&&chance(.6)){R.tribute=true;extra=`${rname(k)}遣王子入质，奉表称藩，岁贡方物。`;}
    addLog(`王师大捷，${rname(k)}乞和。`,'big');
    return `捷书飞至：王师${defensive?'尽逐犯境之敌，反旆深入其境':'深入其境，迭破其军'}，${rname(k)}遣使乞和，献马牛金帛以赎。${extra}\n献俘阙下之日，观者如堵，山呼万岁！`;
  }
  if(outcome==='rout'){
    R.might=clamp(R.might+6,15,95);R.rel=25;
    fxc({a:-10,m:-8,p:-5,t:-8});
    addLog(`王师败绩于${rname(k)}，丧师辱国。`,'bad');
    return `败报至京：王师丧师过半，弃甲如山……朝廷不得已卑辞厚币以请和。${rname(k)}受币而骄，边民泣血。\n此役之耻，史不绝书。`;
  }
  if(score>0){
    R.rel=48;R.might=clamp(R.might-6,15,95);
    fxc({a:4,t:-3});
    addLog(`与${rname(k)}议和，约为兄弟之国。`);
    return `我据上风而许和：${rname(k)}称谢罢兵，约为兄弟之国，各守疆界。\n虽未全功，国威已立。`;
  }
  if(score<0){
    R.rel=42;
    fxc({a:-6,t:-9});
    addLog(`与${rname(k)}屈和，岁输金帛。`,'bad');
    return `战事不利，和议遂成：岁输${rname(k)}金帛，使节卑辞于其庭。\n主和者弹冠相庆，主战者拊膺痛哭。`;
  }
  R.rel=45;fxc({t:-4});
  addLog(`与${rname(k)}罢兵言和。`);
  return `兵连祸结，两败俱伤，乃各引兵归，盟于界上。\n烽烟暂熄，边地始得春耕。`;
}

  const sp=spkOff('war','war','军报如雪');
  const tag={txt:'兵事',color:'#6e3530'};
  const body=`王师与${rname(k)}${W.year>1?'相持已'+cn(W.year)+'年':'兵端方启'}，${warScoreTxt()}。\n馈饷日费千金，${R.might>58?'敌兵犹悍':'敌力渐疲'}；${S.t<30?'而我府库已见底——':'庙算决于陛下——'}是持重，是决战？`;
  const peaceMode=W.score<=-2||W.year>=3;
  const optL=peaceMode
    ?{txt:'遣使议和',fx:{},after:S=>endWar('peace'),log:`遣使与${rname(k)}议和。`}
    :{txt:'持重缓图',fx:{t:-5},after:S=>{
        const g=chance(clamp(.45+offTalent('war')/30,.45,.8));
        if(g)W.score+=1;
        if(W.score>=4)return endWar('win');
        return g?'坚壁清野，轻骑断敌粮道。敌势渐挫，我据上风。':'两军相持，烽燧相望，胜负未分。';
      },log:'前线持重缓图。'};
  const optR={txt:'会战决胜',risky:1,fx:{t:-7},after:S=>{
      const p=clamp(.5+(S.m-R.might)/150+offTalent('war')/45+(S.factions.army.attitude-50)/300+W.score*.05,.15,.88);
      if(chance(p)){
        W.score+=2;fxc({m:-3,a:3,f:{army:[2,2]}});
        if(W.score>=4)return endWar('win');
        return `两军会于野，王师大破之，斩获以万计！${rname(k)}夺气而遁。`;
      }
      W.score-=2;fxc({m:-9,a:-4,p:-3});
      if(W.score<=-4)return endWar('rout');
      return '会战不利，王师折损甚众，退保城垒。败报至京，米价为之腾贵。';
    },log:`与${rname(k)}会战。`};
  return {kind:'choice',seasonal:true,title:`征${rname(k)} · 岁${cn(W.year)}`,tag,sp,body,ctx:{},opts:[optL,optR]};
}

/* ---------- 年结算（每4卡） ---------- */
function yearTick(){
  const notes=[];
  /* 部门产出 */
  const drift={t:-1,p:0,m:0,a:0};
  const outMap={revenue:'t',war:'m',justice:'p',rites:'a'};
  for(const o in outMap){
    const m=officer(o);
    let d=m?(m.talent>=8?2:m.talent>=6?1:m.talent>=4?0:-1):-2;
    if(o==='revenue'&&m&&m.talent>=6)d+=1;
    drift[outMap[o]]+=d;
  }
  if(S.p>=55)drift.t+=1;
  if(S.p>=78)drift.t+=1;
  if(S.flags.silkroad)drift.t+=1;
  if(S.flags.pingzhun)drift.t+=1;
  RKEYS.forEach(k=>{const R=S.realms[k];if(R.market)drift.t+=1;if(R.tribute)drift.t+=1;});
  if(S.war){drift.t-=2;drift.p-=1;}
  const ch=officer('chancellor');
  if(!ch)drift.a-=2;
  else{if(ch.loyalty>70&&ch.talent>=6)drift.a+=1;if(ch.ambition>75)drift.a-=1;}
  if(S.t<18){drift.m-=2;notes.push('军饷不继，士气低落。');}
  if(topFactions()[0].power>78)drift.a-=1;
  if(S.flags.regency)drift.a-=1;
  if(S.score.years>90)drift.t-=1;
  if(S.score.years>180){drift.t-=1;drift.a-=1;}
  if(S.score.years>280){drift.t-=1;drift.a-=1;}
  applyFx(drift);
  if(checkFall())return 'over';

  /* 派系演化与阴谋 */
  FKEYS.forEach(k=>{
    const F=S.factions[k];
    const seats=S.ministers.filter(m=>m.faction===k&&m.office).length;
    F.power=clamp(F.power+(seats>=3?2:seats===2?1:seats===0?-2:0),5,100);
    F.attitude=clamp(F.attitude+(F.attitude<55?1:-0.8),0,100);
    if(F.attitude<25)F.plot+=((F.power>55&&F.attitude<18)?2:1);
    else if(F.attitude>40)F.plot=Math.max(0,F.plot-2);
  });

  /* 四夷消长 */
  if(S.war&&S.flags.regency){
    const wk=S.war.k;
    realm(wk).war=false;realm(wk).truce=3;realm(wk).rel=40;S.war=null;
    applyFx({t:-8,a:-4});
    notes.push(`主少国疑，摄政不欲边事掣肘，遣使与${rname(wk)}媾和，岁币若干，战事遂寝。`);
    addLog(`摄政与${rname(wk)}媾和罢兵。`);
  }
  RKEYS.forEach(k=>{
    const R=S.realms[k];
    if(R.truce>0)R.truce--;
    if(R.war)return;
    R.rel=clamp(R.rel+(R.market?1:0)+(R.rel>52?-1:R.rel<48?1:0)+ri2(-2,2),0,100);
    R.might=clamp(R.might+ri2(-2,2),15,95);
    if(R.tribute&&R.might>55&&chance(.25)){
      R.tribute=false;R.rel=clamp(R.rel-10,0,100);
      notes.push(`${rname(k)}国势复振，渐不奉正朔，贡使不至。`);
      addLog(`${rname(k)}叛盟绝贡。`,'bad');
    }
    if(R.market&&R.rel<30){R.market=false;notes.push(`边衅既开，与${rname(k)}互市遂绝。`);}
    if(R.rel<30&&R.might>45&&!R.warned){R.warned=1;notes.push(`边报：${rname(k)}与我交恶日深，其国势${mightTxt(R.might)}，斥候出没于塞下——兵祸恐不远矣。`);}
    if(R.rel>=40)R.warned=0;
  });

  /* 密谈生成：可见者排队成密折卡 */
  const visN=Math.floor(offTalent('censor')/3);
  const tries=shuffle(WHISPERS);let made=0,vis=0,want=ri2(1,3);
  for(const w of tries){
    if(made>=want)break;
    try{
      if(!w.cond(S))continue;
      const ctx=w.gen(S);if(!ctx)continue;
      w.fx(S,ctx);made++;
      if(vis<visN&&S.whisPending.length<2){
        const txt=w.text(S,ctx);
        S.whisPending.push({type:w.type,react:w.react,text:txt,k:ctx.k||null,m:ctx.m||null});
        addLog(txt,'whisper');vis++;
      }
    }catch(e){}
  }

  /* 权臣判定 */
  const pm=S.flags.powerMin;
  if(pm&&(!S.ministers.includes(pm)||pm.office!=='chancellor'||S.factions[pm.faction].power<55)){
    S.flags.powerMin=null;addLog('权臣之势渐衰，朝局稍安。');notes.push('权臣之势渐衰。');
  }
  if(!S.flags.powerMin&&ch&&ch.ambition>65&&S.factions[ch.faction].power>65){
    S.flags.powerMin=ch;
    addLog(`宰相${ch.name}权势日隆，渐有震主之威。`,'bad');
    notes.push(`宰相${ch.name}门庭若市，权倾朝野——皇权将岁岁受蚀。`);
  }
  if(S.flags.powerMin){S.a=clamp(S.a-2,0,100);S.factions[S.flags.powerMin.faction].power=clamp(S.factions[S.flags.powerMin.faction].power+1,5,100);}

  /* 大臣老病 */
  for(const m of S.ministers.slice()){
    m.age++;
    if(m.age>62&&chance((m.age-62)*0.028)){
      const wasOff=m.office?OFFICES[m.office].name:'';
      removeMinister(m);
      addLog(`${wasOff}${m.name}病卒，年${m.age}。`);
      if(wasOff)notes.push(`${wasOff}${m.name}病卒于任上，其位虚悬。`);
    }
  }
  while(S.ministers.filter(m=>!m.office).length<4){
    const q=offTalent('personnel');
    S.ministers.push(newMinister(null,{talent:ri2(2,Math.min(9,4+Math.ceil(q/2)+(S.flags.examReform?1:0)))}));
  }

  /* 宫闱 */
  for(const p of S.princes.slice()){
    p.age++;
    if(p.health<35&&chance(.2)){
      S.princes=S.princes.filter(x=>x!==p);
      addLog(`皇子${p.name}薨，年${p.age}。`,'bad');
      notes.push(`皇子${p.name}不幸夭亡，宫中缟素。`);
    }
  }
  if(!S.flags.regency&&S.consorts.length&&S.emperor.age<55&&S.princes.length<5&&chance(.3)){
    const mom=pick(S.consorts);
    const p={name:newPrinceName(),age:0,talent:ri2(3,9),health:ri2(55,95),motherFaction:mom.faction,crown:false,scheming:0};
    S.princes.push(p);
    addLog(`${mom.rank}${mom.name}诞下皇子，赐名${p.name.slice(1)}。`,'big');
    notes.push(`喜讯：${mom.rank}诞下皇子${p.name}，举宫同庆。`);
  }

  /* 圣体 */
  const e=S.emperor;
  e.age++;e.reignYears++;
  let dec=ri2(0,2);
  if(e.age>50)dec++;if(e.age>62)dec++;
  if(e.age>=e.lifespan)dec+=10;
  e.health=clamp(e.health-dec,0,100);

  S.score.years++;
  if(S.t>66&&S.p>66&&S.m>66&&S.a>66){S.score.golden++;notes.push('史官记：是岁天下大治。');addLog('是岁，四海升平，天下大治。','big');}

  S.year++;S.eraYear++;
  if(S.quest){
    S.quest.timer--;S.quest.age=(S.quest.age||0)+1;
    if(S.quest.age>14){
      const Q=QUESTS[S.quest.id];
      addLog(`国策【${Q.name}】迁延日久，事遂不行。`,'bad');
      S.pending.push(noteCard('国策流产',`【${Q.name}】行之十余年而无终局，有司怠惰，朝议汹汹，事遂寝。`,NARRATOR()));
      S.quest=null;S.questCool=6;
    }
  }
  if(S.questCool>0)S.questCool--;

  if(e.health<=0){succession();return 'dead';}
  if(checkFall())return 'over';

  /* 重要事项 -> 叙事卡 */
  notes.forEach(n=>S.pending.push(noteCard('岁闻',n)));
  /* 低值预警 -> 警示卡 */
  ['t','p','m','a'].forEach(k=>{
    if(S[k]<18&&!S.flags.warned[k]){S.flags.warned[k]=1;S.pending.unshift(warnCard(k));}
    if(S[k]>=25)S.flags.warned[k]=0;
  });
  return 'ok';
}
function checkFall(){
  const f=S.t<=0?'t':S.p<=0?'p':S.m<=0?'m':S.a<=0?'a':null;
  if(f)gameOver(f);
  return f;
}

/* ---------- 继承 ---------- */
function shiOf(e,avg){
  if(S.flags.assassinated)return '愍';
  if(avg>66&&e.reignYears>=16)return S.m>62?'武':'文';
  if(avg>55)return pick(['景','宣','孝','明']);
  if(avg>42)return pick(['平','惠','安']);
  if(avg>28)return pick(['僖','怀','靖']);
  return pick(['炀','灵','哀']);
}
function succession(){
  const e=S.emperor;
  const avg=(S.t+S.p+S.m+S.a)/4;
  const temple=TEMPLE_SEQ[Math.min(S.gen,TEMPLE_SEQ.length-1)];
  const shi=shiOf(e,avg);
  e.temple=temple;
  const deathLine=S.flags.assassinated?`帝崩于非命，春秋${e.age}。`:`帝崩于大内，春秋${e.age}。`;
  addLog(`${deathLine}庙号${temple}，谥曰${shi}皇帝，在位${e.reignYears}年。`,'big');

  let heir=S.princes.find(p=>p.crown)
        ||S.princes.filter(p=>p.age>=15).sort((a,b)=>b.age-a.age)[0]
        ||S.princes.slice().sort((a,b)=>b.age-a.age)[0]||null;
  const motherF=heir?heir.motherFaction:null;
  const rivals=S.princes.filter(p=>p!==heir&&(p.scheming||0)>=3);
  let body=`${S.era}${yearCn(S.eraYear)}年，${deathLine}\n庙号${temple}，谥曰${shi}皇帝，葬于皇陵。\n`;

  S.gen++;S.score.gens++;
  S.flags.regency=null;
  const newEra=makeEra();
  let regSetup=null;

  if(heir){
    const crowned=heir.crown;
    S.emperor={name:heir.name,age:heir.age,health:Math.max(40,heir.health),lifespan:ri2(44,80),temple:null,reignYears:0};
    S.a=clamp(S.a-8+(heir.talent-5),5,100);
    if(motherF){S.factions[motherF].power=clamp(S.factions[motherF].power+8,5,100);S.factions[motherF].attitude=clamp(S.factions[motherF].attitude+5,0,100);}
    if(heir.age>=15){
      body+=`\n${crowned?'皇太子':'皇子'}${heir.name}柩前即位，时年${cn(heir.age)}。\n${crowned?'国本早定，中外帖然。':'仓促拥立，朝野观望，新君威信未孚。'}`;
      if(!crowned)S.a=clamp(S.a-8,5,100);
      addLog(`新帝${heir.name}即位，改元${newEra}。`,'big');
    }else{
      regSetup=chooseRegent(motherF);
      S.flags.regency=regSetup;
      body+=`\n幼主${heir.name}即位，年方${cn(heir.age)}岁。\n${regSetup.kind}${regSetup.name?('·'+regSetup.name):''}摄政，临朝称制。\n主少国疑——陛下须韬光养晦，待羽翼丰满，一举亲政。`;
      addLog(`幼主${heir.name}即位，${regSetup.kind}摄政。改元${newEra}。`,'bad');
    }
    if(rivals.length){
      const rv=rivals[0];
      S.a=clamp(S.a-6,5,100);
      if(rv.motherFaction)S.factions[rv.motherFaction].plot+=2;
      body+=`\n${rv.name}觊觎大位已久，奉诏就藩之日，回望宫阙，目光阴鸷。`;
    }
  }else{
    S.emperor={name:'姜'+pick(EMPEROR_GIVEN),age:ri2(17,28),health:ri2(70,90),lifespan:ri2(44,78),temple:null,reignYears:0};
    S.a=clamp(S.a-18,5,100);
    body+=`\n大行皇帝无嗣！宰执与宗正连夜密议，迎立宗室疏属${S.emperor.name}入继大统。\n仓促之间，法统不固，人心浮动。`;
    if(S.flags.assassinated){S.a=clamp(S.a-8,5,100);body+='\n弑君之案未明，新君如坐针毡。';}
    addLog(`宗室${S.emperor.name}入继大统，改元${newEra}。`,'big');
  }
  if(S.war)body+=`\n边烽未熄——与${rname(S.war.k)}之战事，仍待新君措置。`;
  S.era=newEra;S.eraYear=1;S.season=0;
  S.consorts=[];S.princes=[];S.empressFaction=null;
  S.flags.prepRule=0;S.flags.assassinated=false;S.flags.warned={};
  FKEYS.forEach(k=>S.factions[k].plot=Math.max(0,S.factions[k].plot-3));
  S.cardQ=[];S.pending=[];S.whisPending=[];
  metaTouch();
  /* 史官曰（LLM润色，失败用静态） */
  const chron={text:null};
  llmChronicle(e,temple,shi,avg,chron);
  showScreen({glyph:'崩',title:temple+shi+'皇帝',sub:`第${cn(S.gen-1)}代 · 在位${e.reignYears}年`,
    body,btn:regSetup?'幼主践祚':'嗣君即位',chron,
    cb:()=>{hideScreen();render();drawNext();}});
}
function chooseRegent(motherF){
  const pm=S.flags.powerMin;
  if(pm&&S.ministers.includes(pm))return {kind:'权相',name:pm.name,faction:pm.faction,alert:0};
  if(motherF||S.consorts.length)return {kind:'太后',name:'',faction:motherF||S.consorts[0].faction,alert:0};
  const c=officer('chancellor');
  if(c)return {kind:'辅政宰相',name:c.name,faction:c.faction,alert:0};
  return {kind:'太后',name:'',faction:'consort',alert:0};
}
function attemptPersonalRule(){
  const R=S.flags.regency;
  const chALL=clamp(0.2+S.flags.prepRule*0.07+S.a/250-R.alert*0.06-(S.factions[R.faction].power-50)/300,0.08,0.92);
  let text='';
  if(chance(chALL)){
    const f=R.faction;
    fxc({a:18,f:{[f]:[-13,-8]}});
    if(S.flags.powerMin&&S.flags.powerMin.faction===f){const pmn=S.flags.powerMin.name;removeMinister(S.flags.powerMin);text=`深夜，忠臣率甲士入宫，边镇大军同日陈兵境上、上表请帝亲政。${R.kind}措手不及，${pmn}下狱赐死。`;}
    else text=`大朝会上，老臣出列，掷地有声："陛下年已${cn(S.emperor.age)}，请${R.kind}归政！"百官齐拜，山呼万岁。${R.kind}环顾左右，竟无一人相助，唯有顿首交权。`;
    text+='\n陛下亲政，乾纲独断，万象更新！';
    S.flags.regency=null;S.flags.prepRule=0;
    addLog(`帝亲政，${R.kind}归政。`,'big');
  }else{
    R.alert++;
    fxc({a:-6});
    addLog('亲政之议受挫。','bad');
    text=`亲政之议方起，${R.kind}党羽即群起攻讦倡议老臣"离间两宫"，贬死于道。陛下孤立殿上，无人应声。（摄政之疑 ${R.alert}/3）`;
    if(R.alert>=3){gameOver('deposed');return null;}
  }
  return text;
}

/* ---------- 终局 ---------- */
const ENDINGS={
  t:{g:'空',t:'府库枯竭',b:'国库一空，百官星散，戍卒因饥自溃。乱兵入京之日，府库唯余空椟与蛛网。\n——失天下之财，遂失天下。'},
  p:{g:'火',t:'万民倒戈',b:'苛政猛于虎。赤旗自大泽而起，所过郡县箪食壶浆以迎"义军"。\n宫阙在冲天火光中化为焦土。\n——水能载舟，亦能覆舟。'},
  m:{g:'破',t:'神京陷落',b:'武备尽弛，烽燧无人。胡骑长驱南下，如入无人之境。\n城破之日，宗庙为墟。\n——忘战者，必危。'},
  a:{g:'禅',t:'权臣受禅',b:'三辞三让的把戏演罢，"禅位"诏书用玺。\n旧主封侯，迁居别馆，旋以"暴疾"闻。\n——大权一去，便不复返。'},
  deposed:{g:'废',t:'幼帝见废',b:'摄政矫太后诏，数帝"失德"，废为庶人，幽于别宫。\n未几，"暴疾而崩"。\n朝野皆知其冤，而无一人敢言。'},
};
function verdict(sc){
  if(sc.years>=100)return '史评：百年国祚，足称一朝。兴亡之间，皆是人事。';
  if(sc.years>=60)return '史评：数世经营，终付东流。后之视今，亦犹今之视昔。';
  if(sc.years>=30)return '史评：守成不易，为君实难。';
  return '史评：其兴也勃焉，其亡也忽焉。';
}
function gameOver(type){
  gameLive=false;
  const E=ENDINGS[type]||ENDINGS.a;
  addLog(`【${E.t}】大雍亡。`,'bad');
  const sc=S.score;
  metaEnd(type);
  const body=`${E.b}\n\n——————————\n国祚 ${sc.years} 年 ｜ 传承 ${sc.gens} 代 ｜ 盛世 ${sc.golden} 年\n——————————\n${verdict(sc)}`;
  showScreen({glyph:E.g,title:E.t,sub:'社稷倾覆',body,btn:'重整山河',
    cb:()=>{hideScreen();titleScreen();}});
}

/* ============================================================
   卡片运行时：导演器 / 滑卡引擎 / 渲染
   ============================================================ */
const SPK_NAMES={censor:'侍御史',war:'戍边老将',envoy:'狄庭来使',monk:'游方僧',daoist:'山中方士',farmer:'乡野老农',merchant:'富商大贾',physician:'太医令',student:'上书学子',lady:'宫中女官',eunuch:'内侍',civil:'州郡刺史'};
function spk(role,name,sub,seed){
  return {svg:portraitSVG({role,seed:seed||ri2(1,99999),faction:'none',age:ri2(34,64),female:role==='lady'}),
    name:name||SPK_NAMES[role]||'有司',sub:sub||'',m:null};
}
function spkMin(m,sub){

}
function spkOff(o,fallbackRole,fallbackName){
  const m=officer(o);
  return m?spkMin(m):spk(fallbackRole||'civil',fallbackName||OFFICES[o].name,'职务暂虚');

const NARRATOR=()=>spk('civil','起居郎','随侍记注',997);
function noteCard(title,body,sp){
  return {kind:'note',seasonal:false,title:title||'闻奏',body,sp:sp||NARRATOR(),opts:[]};

/* ---------- 效果提示 ---------- */
function deriveHint(opt){
  const parts=[];const fx=opt.fx||{};
  ['t','p','m','a'].forEach(k=>{if(fx[k])parts.push(`<span class="${fx[k]>0?'hint-up':'hint-dn'}">${STAT_GLYPH[k]}${fx[k]>0?'↑':'↓'}</span>`);});
  if(fx.f)for(const k in fx.f){const[dp,da]=fx.f[k];const v=dp||da;if(!v)continue;
    parts.push(`<span class="${v>0?'hint-up':'hint-dn'}">${FCHAR[k]}${v>0?'↑':'↓'}</span>`);}
  if(fx.r)for(const k in fx.r){const[dr,dm]=fx.r[k];const v=dr||dm;if(!v)continue;
    parts.push(`<span class="${v>0?'hint-up':'hint-dn'}">${RCHAR[k]}${v>0?'↑':'↓'}</span>`);}
  if(fx.health)parts.push(`<span class="${fx.health>0?'hint-up':'hint-dn'}">体${fx.health>0?'↑':'↓'}</span>`);
  if(opt.risky)parts.push('<span class="hint-q">？</span>');
  return parts.join(' ');
}

  if(!gameLive||!S)return;

  if((S.t<=0||S.p<=0||S.m<=0||S.a<=0)&&!S.pending.length){checkFall();return;}
  let card=S.pending.shift();
  if(!card)card=seasonalCard();

}
function seasonalCard(){
  if(S.flags.regency)return regencyCard();
  const c=crisisCard();if(c)return c;
  if(S.war&&S.war.turnYr!==S.year)return warTurnCard();
  if(S.quest&&S.quest.timer<=0)return questStageCard();
  const qo=questOfferCard();if(qo)return qo;
  if(S.persDoneYr!==S.year){const pc=personnelCard();if(pc)return pc;}
  if(S.whisPending.length)return whisperCard(S.whisPending.shift());
  const pet=petitionCard();if(pet)return pet;
  return eventCard();
}

/* ---------- 事件抽取（静态库 + LLM队列） ---------- */
function okEv(ev,drawnBig){
  if(ev.once&&S.onceDone[ev.id])return false;
  if(S.cooldown[ev.id]&&S.year<S.cooldown[ev.id])return false;
  if(drawnBig&&ev.w>=99)return false;
  try{if(!ev.cond(S))return false;}catch(e){return false;}
  return true;
}
function weightedDraw(pool){
  let total=pool.reduce((s,e)=>s+e.w,0),r=Math.random()*total;
  for(const e of pool){r-=e.w;if(r<=0)return e;}
  return pool[0];
}
function pickEvent(crisisOnly){
  for(let tries=0;tries<6;tries++){
    const pool=EVENTS.filter(ev=>(!!ev.crisis===!!crisisOnly)&&okEv(ev));
    if(!pool.length)return null;
    const sel=weightedDraw(pool);
    let ctx={};
    if(sel.setup){
      try{ctx=sel.setup(S);}catch(e){ctx=null;}
      if(!ctx||Object.values(ctx).some(v=>v===undefined)){S.cooldown[sel.id]=S.year+1;continue;}
    }
    S.cooldown[sel.id]=S.year+(sel.cool||3);
    if(sel.once)S.onceDone[sel.id]=1;
    return buildEventCard(sel,ctx);
  }
  return null;
}
function crisisCard(){return pickEvent(true);}
function eventCard(){
  if(S.llmQ.length&&chance(.55)){
    const e=S.llmQ.shift();
    return buildLLMCard(e);
  }
  const c=pickEvent(false);
  if(c)return c;
  if(S.llmQ.length)return buildLLMCard(S.llmQ.shift());
  const idle=noteCard('无事',`${S.era}${yearCn(S.eraYear)}年${SEASONS[S.season]}，四方无事，帝披览旧档而已。`);
  idle.seasonal=true;return idle;
}
function buildEventCard(ev,ctx){
  let body='';try{body=typeof ev.body==='function'?ev.body(S,ctx):ev.body;}catch(e){body='（章奏字迹漫漶）';}
  let sp;try{sp=ev.spx?ev.spx(S,ctx):NARRATOR();}catch(e){sp=NARRATOR();}
  S.recentTitles.push(ev.title);if(S.recentTitles.length>12)S.recentTitles.shift();
  return {kind:ev.fate?'fate':'choice',seasonal:true,title:ev.title,tag:ev.tag||null,
    sp,body,ctx,opts:ev.opts.map(o=>Object.assign({},o,{txt:o.txtf?o.txtf(S,ctx):o.txt,fx:o.fxf?o.fxf(S,ctx):o.fx}))};
}

/* ---------- 滑卡引擎 ---------- */
const dragState={on:false,x0:0,dx:0};
function bindSwipe(el,card){
  el.addEventListener('pointerdown',e=>{
    if(animLock)return;
    dragState.on=true;dragState.x0=e.clientX;dragState.dx=0;dragState.lastDx=0;
    el.classList.remove('snap');
    try{el.setPointerCapture(e.pointerId);}catch(_){}
  });
  el.addEventListener('pointermove',e=>{
    if(!dragState.on)return;
    dragState.dx=e.clientX-dragState.x0;
    applyDrag(el,dragState.dx);
  });
  const up=()=>{
    if(!dragState.on)return;dragState.on=false;
    dragState.lastDx=Math.abs(dragState.dx);
    const th=Math.min((window.innerWidth||360)*0.24,110);
    if(Math.abs(dragState.dx)>th){flyOff(el,card,dragState.dx>0?1:0);}
    else{el.classList.add('snap');el.style.transform='';light(null);dragState.dx=0;}
  };
  el.addEventListener('pointerup',up);
  el.addEventListener('pointercancel',up);
}
function applyDrag(el,dx){
  el.style.transform=`translateX(${dx}px) rotate(${dx*0.055}deg) translateY(${Math.abs(dx)*-0.05}px)`;
  if(Math.abs(dx)>14)light(dx>0?'r':'l');else light(null);
}
function flyOff(el,card,side){
  if(animLock)return;animLock=true;
  const st=el.querySelector('.c-stamp');
  if(st){st.textContent=sealChar(card,side);st.classList.add('on');}
  el.classList.add('fly');
  const W=window.innerWidth||360;
  el.style.transform=`translateX(${side?W+80:-(W+80)}px) rotate(${side?26:-26}deg) translateY(-30px)`;
  el.style.opacity='0';
  setTimeout(()=>{animLock=false;dragState.dx=0;light(null);commit(card,side);},330);
}
function tapChoice(side){
  if(animLock||!S||!S.cur)return;
  const el=$('#card-area .gcard');
  if(el)flyOff(el,S.cur,side);
}

/* ---------- 结算一张卡 ---------- */
function commit(card,side){
  if(!S)return;
  const opt=card.kind==='note'?null:card.kind==='fate'?card.opts[0]:card.opts[side];
  fxCollector=[];
  let extra=null;
  if(opt){
    applyFx(opt.fx);
    if(opt.after){try{extra=opt.after(S,card.ctx)||null;}catch(e){extra=null;}}
    if(opt.log)addLog(opt.log);
  }
  fxCollector=null;
  if(!gameLive)return;
  pulseOrbs();
  if(opt&&opt.next){try{S.pending.unshift(opt.next(S,card.ctx));}catch(e){}}
  if(extra){S.pending.unshift(noteCard(card.title||'后事',extra,card.sp));}
  else if(opt&&opt.result){S.pending.unshift(noteCard(card.title||'后事',opt.result,card.sp));}
  let status='ok';
  if(card.seasonal){
    S.season++;
    if(S.season>3){S.season=0;status=yearTick();}
  }
  if(status!=='ok')return;
  if(!gameLive)return;
  renderTop();
  drawNext();
}

  {txt:'驱病者出城',fx:{p:-12,a:-3},result:'病者哀号于野，死相枕藉。疫渐息，人心已寒。',log:'大疫，驱病者出城。'},
  {txt:'设病坊施药',fx:{t:-10,p:9},result:'病坊收治万人，疫势月余而衰。',log:'大疫，设病坊救治。'},
 ]},
{id:'refugee',title:'流民聚京',cool:4,w:2,cond:S=>S.p<55,
 spx:S=>spk('farmer','流民耆老','扶杖叩阙'),
 body:S=>`小民等数万扶老携幼，自灾乡逃来京畿就食。但求一粥一棚，绝不敢生事——京兆尹已闭城三日了。`,
 opts:[
  {txt:'闭城驱逐',fx:{p:-10},result:'流民转徙他乡，沿途劫掠渐起。',log:'驱逐流民。'},
  {txt:'设粥棚，募壮者入军',fx:{t:-9,p:7,m:5},result:'流民得食，壮者万人编入军籍。',log:'抚流民，募壮丁。'},
 ]},
{id:'granary',title:'义仓亏空',cool:6,w:2,cond:S=>offTalent('censor')>=4,
 spx:S=>spkOff('censor'),
 setup:S=>{const t=pick(S.ministers.filter(m=>!m.office&&m.faction!=='eunuch'))||pick(S.ministers.filter(m=>m.office!=='chancellor'));return{t};},
 body:(S,c)=>`臣查得：${c.t.name}族中子弟任仓曹时盗卖义仓存粮数万石，账册涂改宛然。此人朝中有靠，牵连颇广——查，还是不查？`,
 opts:[
  {txt:'罚俸了事',fx:{t:2,a:-3,p:-4},result:'高高举起，轻轻放下。御史台诸官摇头叹息。',log:'义仓案轻纵。'},
  {txt:'严查到底',fx:{t:6,p:5,a:3},after:(S,c)=>{const f=c.t.faction;fxc({f:{[f]:[-4,-7]}});removeMinister(c.t);return `穷究其狱，${c.t.name}坐赃论死，追赃入库。${fname(f)}一系人人自危，而天下知朝廷不容贪墨。`;},log:'义仓案，严惩贪官。'},
 ]},
/* —— 礼制皇权 —— */
{id:'omen',title:'祥瑞迭见',cool:8,w:1.5,cond:S=>S.a>45&&S.t>35,
 spx:S=>spkOff('rites'),
 body:S=>`诸州争献祥瑞：嘉禾合穗，白鹿现于山林，黄河水清三日。臣率群臣上表：请封禅泰山，告成功于天地！`,
 opts:[
  {txt:'谦辞不受',fx:{a:3,p:3},result:'帝曰："年谷未丰，边备未饬，何功之有？"群臣叹服。',log:'帝谦辞封禅。'},
  {txt:'东封泰山',fx:{t:-16,a:12,p:-5},result:'车驾东巡，仪卫千里。天子威仪，震耀寰宇。',log:'封禅泰山。'},
 ]},
{id:'eclipse',title:'日有食之',cool:7,w:2,cond:S=>true,
 spx:S=>spk('daoist','太史令','仰观天象'),
 body:S=>`日有食之，既。京师昼晦，百姓惶骇。臣按占书：日食示警，咎在人主——请陛下避殿减膳，下诏修省。`,
 opts:[
  {txt:'日月常度，不必惊扰',fx:{a:-4},result:'帝不修省。民间窃议天子不畏天。',log:'日食，帝不修省。'},
  {txt:'下罪己诏',fx:{p:8,a:-3},result:'诏书布告天下，自陈阙失。百姓闻之，反多感念。',log:'日食，帝下罪己诏。'},
 ]},
{id:'exam',title:'贡举之争',cool:5,w:3,cond:S=>true,
 spx:S=>spk('student','寒门举子','伏阙上书'),
 body:S=>`学生等十年寒窗，而考官皆出世族，去取唯凭门第！请行糊名誊录，一凭文章定去取。\n（吏部${off('personnel')}言：取士当重家学渊源，骤进寒素恐乱朝纲。）`,
 opts:[
  {txt:'维持门第旧制',fx:{f:{gentry:[5,4],scholar:[-3,-8]}},result:'放榜之日，朱紫之家弹冠相庆，寒士掩卷而泣。',log:'贡举仍重门第。'},
  {txt:'糊名誊录取士',fx:{a:4,f:{scholar:[7,7],gentry:[-5,-7]}},result:'是科寒门登第过半，天下士子额手相庆。世族哗然。',log:'科举糊名，寒门大进。'},
 ]},
{id:'royalkin',title:'宗室横行',cool:6,w:2,cond:S=>true,
 spx:S=>spkOff('justice'),
 body:S=>`宗室子弟纵奴行凶，殴杀平民于市，京兆府不敢问。臣冒死奏闻：请依律治罪——王子犯法，可与庶民同罪否？`,
 opts:[
  {txt:'交宗正家法处置',fx:{p:-9,a:-3,f:{scholar:[0,-5]}},result:'死者家人号哭衙前，无人敢理。清流寒心。',log:'包庇宗室。'},
  {txt:'依律明正典刑',fx:{p:10,a:5,f:{gentry:[0,-3]}},result:'宗室伏法，观者万人皆呼青天。诸王自此敛迹。',log:'宗室伏法，万民称快。'},
 ]},
{id:'history',title:'请修国史',once:true,w:1,cond:S=>S.year>5,
 spx:S=>spkOff('rites'),
 body:S=>`太祖创业垂统，功业煌煌，而国史未修，恐岁久湮没。臣请开史馆，命儒臣撰述，以传万世。`,
 opts:[
  {txt:'用兵用钱之际，且缓',fx:{f:{scholar:[0,-3]}},result:'文臣怏怏，谓朝廷重武轻文。',log:'缓修国史。'},
  {txt:'开馆修史',fx:{t:-6,a:5,f:{scholar:[3,4]}},result:'史馆既开，海内文士云集京师。',log:'开史馆修国史。'},
 ]},
/* —— 军事边患 —— */
{id:'raid',title:'北狄寇边',cool:3,w:3,cond:S=>!S.war&&!S.realms.di.war&&S.realms.di.rel<65,
 spx:S=>spkOff('war','war','兵部'),
 body:S=>`北狄铁骑寇掠边州，杀掠吏民，驱牛马数万而去。边将告急——是发兵反击，还是遣使纳币求和？`,
 opts:[
  {txt:'纳币议和',fx:{t:-12,p:-3,a:-6,m:1,f:{army:[0,-6]},r:{di:[8,0]}},result:'狄人受币而退。边将愤言："以金帛饲虎，虎终噬人。"',log:'纳币与狄议和。'},
  {txt:'发兵反击',risky:1,fx:{t:-10},after:S=>{const win=chance(clamp(S.m/130+offTalent('war')/40,0.2,0.85));if(win){fxc({m:6,a:7,p:3,f:{army:[5,4]}});S.realms.di.might=clamp(S.realms.di.might-5,15,95);return '王师出塞，大破狄骑于阴山之下，斩获甚众。捷书至京，朝野振奋！';}fxc({m:-12,a:-6,p:-5,f:{army:[-3,-4]}});S.realms.di.rel=clamp(S.realms.di.rel-4,0,100);return '王师轻进中伏，损兵折将而还。边地为之骚然。';},log:'北狄寇边，发兵反击。'},
 ]},
{id:'victory',title:'边将大捷',cool:5,w:2,cond:S=>S.m>45,
 spx:(S,c)=>c.g?spkMin(c.g,'献俘阙下'):spk('war','报捷信使'),
 setup:S=>({g:S.ministers.find(m=>m.office==='war')||pick(S.ministers.filter(m=>m.faction==='army'))}),
 body:(S,c)=>`边将出塞千里，大破敌庭，献俘阙下！${c.g?c.g.name+'总领其功，':''}军中威望如日中天——士卒只知有将军，不知有朝廷。`,
 opts:[
  {txt:'召还京师，明升暗夺',fx:{a:5,m:-4,f:{army:[-6,-8]}},after:(S,c)=>{if(c.g){c.g.loyalty=clamp(c.g.loyalty-12,0,100);c.g.ambition=clamp(c.g.ambition+8,0,100);}return '功臣入朝荣养，兵权别授。军中将士愤愤不平。';},log:'召还功臣，收其兵权。'},
  {txt:'重赏功臣，加官进爵',fx:{t:-8,m:5,f:{army:[8,7]}},result:'三军感奋，愿为效死。然武人之势愈张。',log:'重赏边功。'},
 ]},
{id:'warlord',title:'藩镇请兼领',cool:5,w:2,cond:S=>S.factions.army.power>40,
 spx:S=>spk('war','朔方节度使','拥兵上表'),
 body:S=>`末将斗胆：边事一体，请兼领邻镇兵马、自署僚属、就地征赋，则虏骑不足忧矣。\n（${off('censor')}密奏：此例一开，藩镇尾大不掉。）`,
 opts:[
  {txt:'严词拒绝',fx:{a:4,f:{army:[-5,-7]}},result:'诏旨切责，节度使惶恐谢罪，心中怨望可知。',log:'拒藩镇兼领之请。'},
  {txt:'准其所请',fx:{m:6,f:{army:[9,5]}},result:'一镇而领三军之政，俨然土皇帝。诸镇皆有效尤之意。',log:'许藩镇兼领。'},
 ]},
{id:'mutiny',title:'戍卒哗变',cool:4,w:3,cond:S=>S.t<30||S.m<35,
 spx:S=>spk('war','溃围都尉','血衣入告'),
 body:S=>`边镇粮饷积欠，戍卒鼓噪哗变，杀监军使，劫府库，推牙将为帅，扬言"但求一饱"！`,
 opts:[
  {txt:'调兵进剿',risky:1,fx:{t:-6},after:S=>{if(chance(clamp(S.m/120+0.2,0.3,0.8))){fxc({m:-3,a:6,f:{army:[-4,-5]}});return '官军压境，乱卒势穷出降，诛其魁首三百。诸镇凛然。';}fxc({m:-10,p:-6,a:-5});return '进剿失利，乱卒流窜数州，所过残破！';},log:'进剿哗变戍卒。'},
  {txt:'发饷抚之',fx:{t:-12,m:3,f:{army:[2,5]}},result:'乱卒得饷而定。然"哗变得饷"之例一开，诸军侧目。',log:'戍卒哗变，发饷抚定。'},
 ]},
{id:'heqin',title:'狄使请婚',cool:8,w:1.5,cond:S=>!S.war&&!S.realms.di.war,
 spx:S=>spk('envoy','北狄正使','奉表请婚'),
 body:S=>`可汗仰慕天朝，愿娶公主，永结舅甥之好——许之则边境暂安，拒之，恐启边衅。外臣静候圣裁。`,
 opts:[
  {txt:'拒之',fx:{a:5,m:-3,f:{army:[2,2]},r:{di:[-6,0]}},result:'帝曰："堂堂天朝，岂以女子安边！"狄使悻悻而去。',log:'拒狄和亲之请。'},
  {txt:'许嫁公主',fx:{t:-8,m:4,p:2,a:-4,r:{di:[14,0]}},after:S=>{S.realms.di.truce=Math.max(S.realms.di.truce,2);return null;},result:'公主和亲出塞，边境数年无事。有诗曰："汉家青史上，计拙是和亲。"',log:'和亲北狄。'},
 ]},
{id:'tribute',title:'万邦来朝',cool:6,w:1.5,cond:S=>S.a>50,
 spx:S=>spk('envoy','鸿胪寺卿','引诸国使'),
 body:S=>`海东、南诏、西域诸国使节来朝，献方物于阙下。回赐之数请旨：厚往薄来以彰天朝气度，抑或平价互市以省国用？`,
 opts:[
  {txt:'平价互市',fx:{t:4,a:-2},result:'使节略有怏色，贸易之利实惠边民。',log:'与诸国平价互市。'},
  {txt:'厚往薄来',fx:{t:-9,a:8},result:'诸国满载而归，争颂天可汗之德。四夷宾服。',log:'厚赐诸国来使。'},
 ]},
{id:'wall',title:'请缮边塞',cool:6,w:2,cond:S=>S.m<60,
 spx:S=>spkOff('war'),
 body:S=>`缘边亭障多有颓圮，烽燧不修，虏骑出入如履平地。臣请发卒缮治，增置戍堡——需钱粮甚巨。`,
 opts:[
  {txt:'国用不足，暂罢',fx:{m:-5,f:{army:[0,-4]}},result:'边将叹曰："朝廷之钱，不肯花在刀刃上。"',log:'罢修边备。'},
  {txt:'拨款大修',fx:{t:-13,m:11},result:'边墙连堡，烽火相望，边备为之一振。',log:'大修边塞。'},
 ]},
{id:'defeat',title:'边军失利',cool:4,w:2.5,cond:S=>S.m<40&&!S.war,
 spx:S=>spk('war','败军偏将','负荆请罪'),
 body:S=>`边军与虏战于野，大败，亡失辎重无数，一城陷没。败报至京，中外震动——罪在主将，还是朝廷自省？`,
 opts:[
  {txt:'斩败将正军法',fx:{a:4,m:-2,f:{army:[-3,-7]}},result:'败将传首九边。将士寒心：胜则功归监军，败则罪在主将。',log:'斩败将。'},
  {txt:'罪己抚恤',fx:{p:6,m:4,a:-2,t:-6},result:'诏书哀痛深切，阵亡之家皆得抚恤。军民誓雪国耻。',log:'兵败，帝罪己抚恤。'},
 ]},
{id:'vassal',title:'西域请附',cool:10,w:1,cond:S=>S.m>55&&S.a>50&&!S.flags.silkroad,
 spx:S=>spk('envoy','西域质子','举国内附'),
 body:S=>`敝国三邦遣子入侍，请置都护，举国内附——纳之则威加万里，然驻军流沙之外，糜费亦巨。`,
 opts:[
  {txt:'羁縻受贡',fx:{a:3,t:2},result:'羁縻而已，省却无穷之费。',log:'羁縻西域。'},
  {txt:'置都护府',fx:{t:-10,a:9,m:3},result:'都护开府西域，商路渐通，声威远播流沙之外。',log:'置西域都护。'},
 ]},
/* —— 派系倾轧 —— */
{id:'impeach',title:'御史劾相',cool:4,w:2.5,
 cond:S=>officer('chancellor')&&officer('censor')&&officer('chancellor').faction!==officer('censor').faction,
 spx:S=>spkMin(officer('censor'),'当廷劾奏'),
 setup:S=>({c:officer('chancellor'),y:officer('censor')}),
 body:(S,c)=>`臣劾宰相${c.c.name}十罪：植党营私、卖官鬻爵、蔽塞言路……（宰相免冠顿首，自辩不已。满朝屏息，皆望御座。）`,
 opts:[
  {txt:'斥御史诬告，贬出京',fx:{a:-5},after:(S,c)=>{const yf=c.y.faction;removeMinister(c.y);fxc({f:{[yf]:[-4,-10],[c.c.faction]:[5,4]}});return `${c.y.name}贬为远州司马，朝中言路为之一塞。宰相之势愈固。`;},log:'贬御史，言路塞。'},
  {txt:'罢宰相，下狱勘问',fx:{a:5},after:(S,c)=>{const f=c.c.faction;removeMinister(c.c);fxc({f:{[f]:[-8,-9],[c.y.faction]:[4,3]}});return `${c.c.name}罢相下狱，其党羽人人自危。相位虚悬，吏部当呈候补。`;},log:'御史劾相，宰相罢职。'},
 ]},
{id:'marriage',title:'禁婚之议',cool:7,w:2,cond:S=>S.factions.gentry.power>45,
 spx:S=>spk('student','寒门郎官','愤而上书'),
 body:S=>`数姓世族自矜门第，私定婚册，不与寒族通婚，嫁娶陪门财动以百万。臣请禁卖婚、毁私册——婚姻者，岂世族之私器！`,
 opts:[
  {txt:'婚姻私事，不问',fx:{f:{gentry:[4,3],scholar:[-2,-5]}},result:'世族弹冠相庆，门第之见愈深。',log:'不禁世族私婚。'},
  {txt:'禁卖婚，毁谱册',fx:{a:5,f:{gentry:[-7,-8],scholar:[4,5]}},result:'诏下，世族阳奉阴违，然其凌驾国法之气焰为之一挫。',log:'禁世族卖婚。'},
 ]},
{id:'eu_monitor',title:'请置监军',cool:6,w:2,cond:S=>S.factions.eunuch.power>25,
 spx:S=>{const m=S.ministers.find(x=>x.faction==='eunuch');return m?spkMin(m,'附耳密奏'):spk('eunuch');},
 body:S=>`老奴密奏：边将拥兵于外，朝廷耳目不及，恐有不测之变。请遣中官出任监军，察将帅动静，直奏御前。`,
 opts:[
  {txt:'用人不疑，不遣',fx:{f:{army:[3,6],eunuch:[0,-4]}},result:'边将感激："主上以国士待我。"然兵柄在外，祸福难知。',log:'不遣监军。'},
  {txt:'遣中官监军',fx:{a:3,m:-4,f:{eunuch:[7,5],army:[-3,-8]}},result:'中官持节赴军。将帅掣肘，然兵权确归于上。',log:'遣宦官监军。'},
 ]},
{id:'consort_office',title:'后族求官',cool:5,w:2,cond:S=>S.consorts.length>0,
 spx:S=>spk('civil',S.consorts[0].name.slice(0,1)+'国舅','禁中赐宴时'),
 body:S=>`臣于禁中再拜：愿为陛下分忧，求领禁军或户部要职——椒房之亲，却之伤中宫之情，授之恐养虎为患。`,
 opts:[
  {txt:'正色拒之',fx:{a:3,f:{consort:[-3,-8]}},result:'帝曰："官爵者天下公器，岂可私授。"中宫闻之垂泪。',log:'拒外戚求官。'},
  {txt:'授以实职',fx:{f:{consort:[9,7]}},after:S=>{const m=newMinister('consort',{loyalty:ri2(50,75),ambition:ri2(45,85)});S.ministers.push(m);return `后兄${m.name}入朝任事，外戚之门，车马骈阗。（已入候补之列）`;},log:'授后族实职。'},
 ]},
{id:'partyfight',title:'朋党廷争',cool:4,w:2.5,
 cond:S=>{const f=topFactions();return f[0].power-f[1].power<15&&f[0].power>40;},
 spx:S=>NARRATOR(),
 setup:S=>{const f=topFactions();return{a:f[0].key,b:f[1].key};},
 body:(S,c)=>`${fname(c.a)}与${fname(c.b)}因铨选之事当廷相争，至于攘袂诟詈，几欲挥拳。两派各上弹章数十道，朝政为之停滞。`,
 opts:[
  {txt:'抑强扶弱以制衡',fx:{a:2},after:(S,c)=>{fxc({f:{[c.b]:[6,4],[c.a]:[-5,-6]}});return `帝抑强扶弱，${fname(c.a)}悚然，始知圣心难测。`;},log:'党争，帝抑强扶弱。'},
  {txt:'各贬首事，以平党争',fx:{a:6},after:(S,c)=>{fxc({f:{[c.a]:[-5,-4],[c.b]:[-5,-4]}});return '两派魁首各贬一级，朝堂暂安。党人之争，岂能一贬了之。';},log:'廷争，两派各贬首事。'},
 ]},
{id:'corrupt',title:'纳贿案发',cool:4,w:2,
 cond:S=>offTalent('censor')>=3&&S.ministers.filter(m=>m.office&&m.office!=='censor').length>2,

 body:(S,c)=>`${rname(c.k)}屡失藩臣之礼，边患不绝。臣谨奏：今我兵甲已利，士饱马腾，请兴问罪之师，犁庭扫穴，永绝边患！\n一旦开战，岁岁靡费，胜负亦未可知。${foeLine(c.k)}`,
 opts:[
  {txt:'止戈为武',fx:{p:2,f:{army:[0,-3]}},result:'帝曰："兵者不祥之器。"其议遂寝，将士解甲叹息。',log:'罢请伐之议。'},
  {txt:'兴师问罪',risky:1,fx:{t:-8},after:(S,c)=>{startWar(c.k);return `庙算既定，誓师于郊。旌旗蔽野，金鼓震天——征${rname(c.k)}之役，自此始矣。`;},log:'下诏兴师。'},
 ]},
/* —— 吏治内政 —— */
{id:'civ_lvling',title:'删定律令',cool:7,w:2,cond:S=>true,
 spx:S=>spkOff('justice'),
 body:S=>`本朝律令承前代之旧，条目繁苛，奸吏得以舞文。臣请删定：然宽则失之纵，严则失之酷——立法之本，伏候圣裁。`,
 opts:[
  {txt:'宽刑省罚',fx:{p:6,a:-2},result:'去苛条百余，狱讼为清。民间称便，而豪猾亦颇自喜。',log:'删律从宽。'},
  {txt:'严刑峻法',fx:{a:5,p:-5},result:'法网加密，吏民凛然。道路以目，而盗贼亦衰。',log:'定律从严。'},
 ]},
{id:'civ_kuoyin',title:'括隐检田',cool:8,w:2,cond:S=>S.factions.gentry.power>45,
 spx:S=>spkOff('revenue'),
 body:S=>`天下版籍隐漏甚多：豪族荫庇丁口，瞒报田亩，赋税尽入私门。臣请遣使括隐检田——所触者，皆有力之家。`,
 opts:[
  {txt:'不扰为安',fx:{f:{gentry:[2,3]}},result:'括隐之议寝。豪门弹冠相庆，国课依旧暗漏。',log:'罢括隐之议。'},
  {txt:'遣使检括',fx:{t:11,p:-2,f:{gentry:[-5,-6]}},result:'检出隐户数十万、隐田无算，岁入大增。世族切齿，乡里亦有怨使者苛扰者。',log:'括隐检田。'},
 ]},
{id:'civ_shuili',title:'兴修水利',cool:6,w:2,cond:S=>true,
 spx:S=>spk('civil','都水监丞','献图请役'),
 body:S=>`关东诸渠岁久失修，旱则无以溉，涝则无以泄。臣绘图以献：修陂塘、浚沟洫，则瘠土可为良田——所费工料甚巨。`,
 opts:[
  {txt:'民力方疲，缓之',fx:{p:-2},result:'图存有司，事付来年。农人望天而食如故。',log:'缓修水利。'},
  {txt:'发帑兴修',fx:{t:-10,p:9},result:'渠成之日，溉田万顷。父老立碑于堰上，颂朝廷之德。',log:'兴修水利。'},
 ]},
{id:'civ_jingcha',title:'京察大计',cool:8,w:1.5,cond:S=>true,
 spx:S=>spkOff('personnel'),
 body:S=>`六年京察之期已至。循例则百官具考状、堂官出考语，例行而已；若严核之，则贪庸者黜、循良者陟——必撄众怒。`,
 opts:[
  {txt:'例行故事',fx:{a:-2},result:'考语皆"称职"。京察如仪，一无黜陟。识者叹纲纪之弛。',log:'京察因循。'},
  {txt:'严核黜陟',fx:{a:6},after:S=>{const ks=shuffle(FKEYS).slice(0,2);ks.forEach(k=>fxc({f:{[k]:[0,-4]}}));return `黜不称职者数十人，能吏不次擢用。百官震悚，${fname(ks[0])}、${fname(ks[1])}尤多怨望。`;},log:'京察严核。'},
 ]},
{id:'civ_yichuan',title:'整顿驿传',cool:7,w:1.5,cond:S=>true,
 spx:S=>spk('civil','驾部郎中','驿务积弊'),
 body:S=>`天下驿站千余，冗卒糜费；而要道文书反多稽滞。或议裁汰以省经费，或议增置以速政令——孰为得计？`,
 opts:[
  {txt:'裁汰冗驿',fx:{t:5,a:-2},result:'裁驿三百，岁省巨万。然偏远州县，奏报愈迟。',log:'裁汰冗驿。'},
  {txt:'增驿广路',fx:{t:-7,a:4,m:2},result:'驿路四通，文书朝发夕至，边警一日数闻。政令之行，遂如臂使指。',log:'增置驿传。'},
 ]},
{id:'civ_xiushi',title:'开馆修史',once:true,w:1.5,cond:S=>S.year>=8,
 spx:S=>spkOff('rites'),
 body:S=>`国朝肇建以来，实录散佚，文献无征。臣请开史馆，命儒臣修国史、定礼乐——文治之盛，自此而彰。`,
 opts:[
  {txt:'武功未竟，罢其议',fx:{f:{scholar:[0,-4]}},result:'儒臣失望而退："盛世不修史，后世何述焉？"',log:'罢修史之议。'},
  {txt:'开馆修史',fx:{t:-5,a:4,f:{scholar:[3,3]}},result:'史馆开于禁中，鸿儒毕集。帝御序文，文教灿然一新。',log:'开馆修国史。'},
 ]},
{id:'civ_kuli',title:'酷吏之议',cool:6,w:2,cond:S=>S.a<55,
 spx:S=>spk('civil','大理寺评事','密荐能员'),
 body:S=>`有吏深文峻法，所至豪强屏迹，号曰"乳虎"。或荐其堪大用：以酷吏行威，则朝廷之令无不行——然所过之处，冤狱亦盛。`,
 opts:[
  {txt:'斥而不用',fx:{p:3,a:-2},result:'帝曰："治国以仁，焉用乳虎。"清议称善。',log:'斥酷吏。'},
  {txt:'擢用之',fx:{a:7,p:-6},after:S=>{const ks=shuffle(['gentry','scholar']).slice(0,1);fxc({f:{[ks[0]]:[0,-5]}});return `酷吏所至，囹圄为满，号令风行。${fname(ks[0])}多有下狱者，道路侧目。`;},log:'擢用酷吏。'},
 ]},
{id:'civ_xunxing',title:'请幸江南',cool:9,w:1.5,cond:S=>S.t>50,
 spx:S=>spk('eunuch','内侍省都知','进巡幸之议'),
 body:S=>`江南财赋之地，圣驾未尝一临。老奴斗胆：请陛下南巡，观风问俗，宣示威德——舟车仪卫，所费固不赀。`,
 opts:[
  {txt:'罢巡省费',fx:{p:2},result:'帝曰："朕居九重而知天下，何必劳民。"',log:'罢南巡之议。'},
  {txt:'銮驾南巡',fx:{t:-12,a:8,p:-3},result:'龙舟千里，江南父老争睹天颜。威德远播，而供亿之费，州县颇以为苦。',log:'帝南巡江南。'},
 ]},
/* —— 危机（导演器优先抽取） —— */
{id:'realm_invade',title:'敌国入寇',crisis:1,cool:3,w:6,
 cond:S=>!S.war&&!S.flags.regency&&RKEYS.some(k=>{const R=S.realms[k];return !R.war&&R.rel<25&&R.might>50&&R.truce===0;}),
 spx:S=>spk('war','八百里加急','边书雪片'),
 setup:S=>{const ks=RKEYS.filter(k=>{const R=S.realms[k];return !R.war&&R.rel<25&&R.might>50&&R.truce===0;});if(!ks.length)return null;return{k:pick(ks)};},
 tag:{txt:'危',color:'#8a2f28'},
 body:(S,c)=>`${rname(c.k)}大举入寇！${realm(c.k).might>65?'号称控弦三十万，':''}连破边堡，兵锋已及内地，州县望风奔溃——战守之策，决于今日！\n${foeLine(c.k)}`,
 opts:[
  {txt:'纳币乞和',fxf:(S,c)=>({t:-12,a:-6,r:{[c.k]:[12,0]}}),after:(S,c)=>{realm(c.k).truce=2;return null;},result:'卑辞厚币，敌兵受赂而退。边民收拾劫余，朝中清议汹汹。',log:'敌入寇，纳币乞和。'},
  {txt:'整军迎战',risky:1,fx:{},after:(S,c)=>{startWar(c.k,{defensive:true});return `帝拍案而起："社稷之主，岂能赂敌求生！"诏天下勤王，大军开赴边关——${rname(c.k)}之役，自此始矣。`;},log:'敌入寇，整军迎战。'},
 ]},
{id:'sick',title:'圣体违和',crisis:1,cool:2,w:4,cond:S=>S.emperor.health<40,
 spx:S=>spk('physician','太医令','跪奏脉案'),
 body:S=>`陛下连日不豫，${S.emperor.health<25?'药石罔效，臣等束手':'臣请静养勿劳'}。朝野闻之人心浮动${S.princes.some(p=>p.crown)?'':'，皆因储位未定而忧'}——有方士自荐金丹，云可延年。`,
 opts:[
  {txt:'静养，委政臣下',fx:{health:12,a:-5},after:S=>{const c=officer('chancellor');if(c)fxc({f:{[c.faction]:[4,0]}});return '帝深居调养，政事委于臣下。圣体渐安，而权柄旁移。';},log:'帝养疾，权委臣下。'},
  {txt:'服方士金丹',risky:1,fx:{t:-6},after:S=>{if(chance(.4)){fxc({health:18});return '丹药入腹，竟觉精力复振。方士赏赐巨万。';}fxc({health:-15});return '金石燥烈伤身，服后烦热呕血，圣躬愈危！';},log:'帝服方士金丹。'},
 ]},
{id:'unrest',title:'民变四起',crisis:1,cool:2,w:4,cond:S=>S.p<32,
 spx:S=>spk('civil','州刺史','告急文书'),
 body:S=>`赋繁役重，民不聊生！数州饥民揭竿而起，攻劫县邑，开仓自赈，旬日之间众至数万——剿，还是抚？`,
 opts:[
  {txt:'减赋罢苛政',fx:{t:-9,p:12,a:-2},result:'诏书所至，乱民相顾："赋既减矣，吾曹何为者？"多自散去。',log:'民变，减赋安民。'},
  {txt:'剿抚并用',fx:{t:-8,p:8,m:-2},result:'官军压境而招抚先行，乱民多解甲归田。元气虽伤，根本未摇。',log:'民变，剿抚并用。'},
 ]},
{id:'rebellion',title:'大泽烽火',crisis:1,cool:2,w:6,cond:S=>S.p<16,
 spx:S=>spk('war','八百里加急','驿马倒毙阙下'),
 body:S=>`妖人以谶纬惑众，称"苍天已死"，举事于大泽，旬月连陷州郡，众号数十万，兵锋直指京畿！社稷存亡，在此一举！`,
 opts:[
  {txt:'许藩镇募兵讨贼',fx:{m:5,a:-10,f:{army:[12,2]}},result:'诏下，诸镇竞起兵马。贼势渐遏，而藩镇自此各拥强兵，号令渐不出都门。',log:'许藩镇募兵讨贼。'},
  {txt:'倾国之兵决战',risky:1,fx:{t:-15},after:S=>{if(chance(clamp(S.m/100+S.factions.army.attitude/400,0.2,0.8))){fxc({p:6,m:-8,a:8,f:{army:[6,3]}});return '官军浴血苦战，终破贼于京郊，传首四方。社稷转危为安，然天下已残破矣。';}fxc({p:-10,m:-15,a:-12});return '官军大溃！京师戒严，宗庙震动，亡国之祸近在眉睫……';},log:'大起义，倾国决战。'},
 ]},
{id:'arrears',title:'百官请俸',crisis:1,cool:3,w:4,cond:S=>S.t<22,
 spx:S=>spk('student','六品郎官','质衣而食'),
 body:S=>`国库匮竭，京官俸料积欠数月，臣等有质衣而食者。百官联名请俸——言辞之间，渐有怨怼之意。`,
 opts:[
  {txt:'向豪族借贷',fx:{t:12,f:{gentry:[6,3]}},result:'豪门慨然输财——自然不是白输的。朝廷自此欠下的，不止是钱。',log:'向豪族借贷。'},
  {txt:'变卖宫藏补发',fx:{t:6,a:-3,p:3},result:'内府珍宝出市易钱，俸料补发。百官感愧交集。',log:'卖宫藏补俸。'},
 ]},
{id:'contempt',title:'朝仪不肃',crisis:1,cool:2,w:4,cond:S=>S.a<32,
 spx:S=>spkOff('censor'),
 body:S=>`今日大朝会，有大臣交头接耳，嬉笑自若；宣诏之时，竟有称病不至者。天子威权之轻，于斯可见——整肃，还是优容？`,
 opts:[
  {txt:'优容不问',fx:{a:-6},result:'人主之柄，又轻一分。',log:'朝仪废弛。'},
  {txt:'廷杖失仪者',fx:{a:8},after:S=>{const f=pick(FKEYS);fxc({f:{[f]:[0,-6]}});return `杖责数人，朝堂肃然。怨望者私语："此衰世之政也。"`;},log:'廷杖整肃朝仪。'},
 ]},
{id:'borderrot',title:'武备废弛',crisis:1,cool:3,w:4,cond:S=>S.m<30,
 spx:S=>spkOff('war'),
 body:S=>`兵部检阅京营：兵籍十万，实存六万，余皆吃空饷之虚额；甲胄朽坏，士不识旗鼓。一旦有警，何以为战！`,
 opts:[
  {txt:'增饷练兵',fx:{t:-13,m:12,f:{army:[3,4]}},result:'厚饷精练，军容渐振。',log:'增饷练兵。'},
  {txt:'查空饷，汰弱补强',fx:{t:5,m:10,f:{army:[-4,-6]}},result:'查革虚额三万，所省尽充军实。诸将多有不安。',log:'清查空饷。'},
 ]},
{id:'pmin1',title:'相府如市',crisis:1,cool:2,w:6,cond:S=>!!S.flags.powerMin,
 spx:S=>spkOff('censor','censor','侍御史'),
 setup:S=>({pm:S.flags.powerMin}),
 body:(S,c)=>`宰相${c.pm.name}权倾朝野：百官除授先谒相府而后闻于上；四方贡献入相门者半。每入朝，赞拜不名，群臣莫敢仰视——陛下，忍，还是动？`,
 opts:[
  {txt:'隐忍不发，麻痹其心',fx:{a:-4},after:(S,c)=>{c.pm.ambition=clamp(c.pm.ambition-5,0,100);S.flags.prepRule+=1;return '帝愈恭谨，赏赐愈厚。权相之心稍懈，而陛下暗中布置又深一层。（积蓄+1）';},log:'帝隐忍以待时。'},
  {txt:'下诏罢相',risky:1,fx:{},after:(S,c)=>resolveOust(c.pm),log:'罢黜权相之诏。'},
 ]},
{id:'pmin2',title:'请加九锡',crisis:1,cool:3,w:7,cond:S=>!!S.flags.powerMin&&S.a<40,
 spx:S=>spk('civil','百官劝进表','墨迹未干'),
 setup:S=>({pm:S.flags.powerMin}),
 body:(S,c)=>`百官联名上表：请加宰相${c.pm.name}九锡之礼，赞拜不名，入朝不趋——此乃篡逆之阶，王莽、曹操故事，陛下不可不知！`,
 opts:[
  {txt:'暂允，以骄其志',fx:{a:-8},after:(S,c)=>{S.flags.prepRule+=2;c.pm.ambition=clamp(c.pm.ambition+5,0,100);return '九锡既加，权相之礼俨然僭主。然其志愈骄，其备愈疏。（积蓄+2）';},log:'权臣加九锡。'},
  {txt:'断然拒绝，孤注罢相',risky:1,fx:{},after:(S,c)=>resolveOust(c.pm,true),log:'拒九锡，罢权相。'},
 ]},
{id:'assassin',title:'宫闱惊变',crisis:1,fate:1,cool:5,w:99,
 cond:S=>FKEYS.some(k=>S.factions[k].plot>=7&&S.factions[k].attitude<25),
 spx:S=>spk('eunuch','值殿内侍','面无人色'),
 setup:S=>({k:FKEYS.find(k=>S.factions[k].plot>=7&&S.factions[k].attitude<25)}),
 body:(S,c)=>`夜半！${c.k==='eunuch'?'值殿宦者忽自袖中抽出短刃':c.k==='consort'?'御膳验出鸩毒，迹连中宫近侍':c.k==='army'?'禁军卫士数人持刃闯入寝殿':'刺客逾墙而入，直扑寝殿'}！变起仓促，电光石火之间——`,
 tag:{txt:'危',color:'#8a2f28'},
 opts:[
  {txt:'命运一掷',risky:1,fx:{},after:(S,c)=>{S.factions[c.k].plot=-4;const guard=S.factions.eunuch.attitude/300+S.a/250+(S.factions.army.attitude>60?0.15:0);if(chance(clamp(0.45+guard,0.4,0.92))){fxc({a:6,f:{[c.k]:[-12,8]}});const purge=S.ministers.filter(m=>m.faction===c.k&&m.loyalty<40)[0];let ex='';if(purge){removeMinister(purge);ex=`穷治其狱，${purge.name}等皆伏诛。`;}return `侍卫扑救及时，刺客就擒！严刑之下，供出主使乃${fname(c.k)}中人。${ex}帝抚膺长叹：卧榻之侧，岂容凶徒。`;}S.emperor.health=0;S.flags.assassinated=true;return `刃光及体，左右救之不及……帝崩于非命。`;},log:'宫闱遇刺。'},
 ]},
{id:'coup',title:'甲士叩阙',crisis:1,cool:5,w:99,
 cond:S=>FKEYS.some(k=>S.factions[k].plot>=8&&S.factions[k].power>55),
 spx:S=>spk('war','禁军校尉','浴血来报'),
 setup:S=>({k:FKEYS.find(k=>S.factions[k].plot>=8&&S.factions[k].power>55)}),
 body:(S,c)=>`鼓打三更，宫门外火光骤起！${fname(c.k)}勾结禁军一部，矫称"清君侧"，甲士数千已叩宫门——社稷安危，决于今夜！`,
 tag:{txt:'危',color:'#8a2f28'},
 opts:[
  {txt:'登楼宣谕，以威慑之',risky:1,fx:{},after:(S,c)=>resolveCoup(c.k,'awe'),log:'政变，帝亲谕乱军。'},
  {txt:'调忠诚禁军血战',risky:1,fx:{},after:(S,c)=>resolveCoup(c.k,'fight'),log:'政变，禁军血战。'},
 ]},
/* —— 锦上添花 —— */
{id:'golden',title:'四海升平',cool:5,w:3,cond:S=>S.t>66&&S.p>66&&S.m>66&&S.a>66,
 spx:S=>spkOff('chancellor','civil','宰执率百官'),
 body:S=>`仓廪实，甲兵利，万民乐业，纲纪修明。诸道争上贺表："海内晏然，可谓盛世！"——史官秉笔，将书何字？`,
 opts:[
  {txt:'戒骄："忧劳兴国"',fx:{a:4,p:2},result:'帝以盛世自警，君臣相勉。史官大书："是岁，天下大治。"',log:'盛世自警。'},
  {txt:'大赦天下同乐',fx:{t:-8,p:8,a:3},result:'赦书下，万方同庆，颂声盈路。',log:'盛世大赦。'},
 ]},
{id:'talent',title:'大才求见',cool:4,w:2,cond:S=>S.ministers.filter(m=>!m.office).length<7,
 spx:S=>spk('student','布衣处士','上万言书'),
 body:S=>`草民上万言书于阙下，纵论天下事。识者惊为王佐之才——${off('personnel')}请召对，量才录用。`,
 opts:[

function petitionCard(){

  const needy=S.ministers.filter(m=>m.office&&m.loyalty<55);

/* ============================================================
   国策（主线任务）
   ============================================================ */
function qOpt(side,Q){
  return {txt:side.txt,fx:side.fx||{},risky:side.p!==undefined,log:side.log,
    after:S=>{
      let txt=side.res||null,go=side.go||'adv';
      if(side.p!==undefined){
        if(chance(side.p)){fxc(side.sFx||{});txt=side.sTxt||txt;go=side.sGo||'adv';}
        else{fxc(side.fFx||{});txt=side.fTxt||txt;go=side.fGo||'fail';}
      }
      if(go==='adv')questAdvance(Q);
      else if(go==='fail')questFail(Q);
      else if(S.quest)S.quest.timer=2;
      return txt;
    }};
}
function questAdvance(Q){
  if(!S.quest)return;
  S.quest.stage++;S.quest.timer=ri2(1,2);
  if(S.quest.stage>=Q.stages.length)questComplete(Q);
}
function questComplete(Q){
  const id=S.quest.id;
  Q.done&&Q.done(S);
  addLog(`国策【${Q.name}】功成——${Q.doneTxt}。`,'big');
  S.questsDone[id]=1;metaQuest(id);
  S.pending.push(noteCard('国策功成 · '+Q.name,Q.doneBody,NARRATOR()));
  S.quest=null;S.questCool=6;
}
function questFail(Q){
  if(Q.failFx)fxc(Q.failFx);
  addLog(`国策【${Q.name}】中道而废。`,'bad');
  S.pending.push(noteCard('国策受挫',Q.failBody||`【${Q.name}】之议遂寝，朝野惜之。`,NARRATOR()));
  S.quest=null;S.questCool=6;
}
function questOfferCard(){
  if(S.quest||S.questCool>0||S.flags.regency)return null;
  const id=Object.keys(QUESTS).find(k=>!S.questsDone[k]&&QUESTS[k].cond(S));
  if(!id)return null;
  if(!chance(.6)){S.questCool=2;return null;}
  const Q=QUESTS[id];S.questCool=2;
  return {kind:'choice',seasonal:true,title:'上疏 · '+Q.name,tag:{txt:'国策',color:'#7a5c28'},
    sp:Q.offerSp(S),body:Q.offerBody(S),ctx:{},
    opts:[
     {txt:'留中，再议',fx:{},after:S=>{S.questCool=5;return null;},result:'此疏留中不发。上疏者长叹而退。'},
     {txt:'纳之，定为国策',fx:{a:2},after:S=>{S.quest={id,stage:0,timer:1,age:0};addLog(`帝纳【${Q.name}】之议，定为国策。`,'big');return null;},result:`【${Q.name}】定为国策，命专人推行——自此每隔一二年，将有一幕呈于御前。`},
    ]};
}
function questStageCard(){
  const Q=QUESTS[S.quest.id];const st=Q.stages[S.quest.stage];
  return {kind:'choice',seasonal:true,title:`${Q.name} · ${st.t}`,
    tag:{txt:`国策 ${cn(S.quest.stage+1)}/${cn(Q.stages.length)}`,color:'#7a5c28'},
    sp:st.sp?st.sp(S):Q.offerSp(S),body:typeof st.b==='function'?st.b(S):st.b,ctx:{},
    opts:[qOpt(st.L,Q),qOpt(st.R,Q)]};
}

const LLM_SPEAKERS={'大臣':null,'御史':'censor','边将':'war','宦官':'eunuch','妃嫔':'lady','僧人':'monk','方士':'daoist','老农':'farmer','富商':'merchant','番使':'envoy','学子':'student','太医':'physician'};

/* ---- 键值存储：window.storage -> localStorage -> 内存，逐级降级 ---- */
const memKV={};
function kvHasWS(){try{return typeof window!=='undefined'&&!!window.storage;}catch(e){return false;}}
async function kvGet(k){
  if(kvHasWS()){try{const r=await window.storage.get(k);return r?r.value:null;}catch(e){return null;}}
  try{const v=localStorage.getItem(k);if(v!==null)return v;}catch(e){}
  return (k in memKV)?memKV[k]:null;
}
function kvSet(k,v){
  if(kvHasWS()){try{const p=window.storage.set(k,v);if(p&&p.catch)p.catch(()=>{});return;}catch(e){}}
  try{localStorage.setItem(k,v);return;}catch(e){}
  memKV[k]=v;
}

/* ---- LLM 接口配置 ---- */
const LLM_DEFAULTS={
  anthropic:{base:'https://api.anthropic.com',model:'claude-sonnet-4-20250514'},
  openai:{base:'https://api.openai.com',model:'gpt-4o-mini'}
};
let LLM={fmt:'anthropic',base:'',key:'',model:''};
async function cfgLoad(){
  try{const v=await kvGet('dy2-llm');
    if(v){const j=JSON.parse(v);
      if(j&&(j.fmt==='openai'||j.fmt==='anthropic'))LLM.fmt=j.fmt;
      LLM.base=String(j&&j.base||'');LLM.key=String(j&&j.key||'');LLM.model=String(j&&j.model||'');}
  }catch(e){}
}
function llmModel(){return (LLM.model||LLM_DEFAULTS[LLM.fmt].model).trim();}
function llmURL(){
  let b=(LLM.base||LLM_DEFAULTS[LLM.fmt].base).trim().replace(/\/+$/,'');
  if(LLM.fmt==='openai'){
    if(/\/chat\/completions$/.test(b))return b;
    if(/\/v\d+$/.test(b))return b+'/chat/completions';
    return b+'/v1/chat/completions';
  }
  if(/\/messages$/.test(b))return b;
  if(/\/v\d+$/.test(b))return b+'/messages';
  return b+'/v1/messages';
}
async function llmCall(messages){
  const headers={'Content-Type':'application/json'};
  if(LLM.fmt==='openai'){
    if(LLM.key)headers['Authorization']='Bearer '+LLM.key;
  }else if(LLM.key){
    headers['x-api-key']=LLM.key;
    headers['anthropic-version']='2023-06-01';
    headers['anthropic-dangerous-direct-browser-access']='true';
  }
  const r=await fetch(llmURL(),{method:'POST',headers,
    body:JSON.stringify({model:llmModel(),max_tokens:4000,messages})});
  if(!r.ok)throw new Error('http '+r.status);
  const data=await r.json();
  if(LLM.fmt==='openai'){
    const c=data&&data.choices&&data.choices[0];
    return String((c&&c.message&&c.message.content)||'');
  }
  return (data.content||[]).map(b=>b.type==='text'?b.text:'').join('');
}

function validateEv(e,cap){
  try{
    if(!e||typeof e!=='object')return null;
    const title=String(e.title||'').trim().slice(0,8);
    const body=String(e.body||'').trim();
    if(!title||body.length<20||body.length>200)return null;
    const speaker=Object.keys(LLM_SPEAKERS).includes(e.speaker)?e.speaker:'大臣';
    if(!Array.isArray(e.opts)||e.opts.length!==2)return null;
    const opts=e.opts.map(o=>{
      const txt=String(o&&o.txt||'').trim().slice(0,12);
      if(!txt)throw 0;
      const fx={};
      ['t','p','m','a'].forEach(k=>{const v=Math.round(Number(o.fx&&o.fx[k]||0));if(v)fx[k]=clamp(v,-cap,cap);});
      if(o.f&&typeof o.f==='object'){
        const fk=Object.keys(o.f).find(k=>FKEYS.includes(k));
        if(fk&&Array.isArray(o.f[fk])){
          const dp=clamp(Math.round(Number(o.f[fk][0])||0),-8,8),da=clamp(Math.round(Number(o.f[fk][1])||0),-8,8);
          if(dp||da)fx.f={[fk]:[dp,da]};
        }
      }
      if(o.r&&typeof o.r==='object'){
        const rk=Object.keys(o.r).find(k=>RKEYS.includes(k));
        if(rk&&Array.isArray(o.r[rk])){
          const dr=clamp(Math.round(Number(o.r[rk][0])||0),-10,10),dm=clamp(Math.round(Number(o.r[rk][1])||0),-6,6);
          if(dr||dm)fx.r={[rk]:[dr,dm]};
        }
      }
      const result=o.result?String(o.result).trim().slice(0,70):null;
      return {txt,fx,result};
    });
    if(!opts.some(o=>Object.keys(o.fx).length))return null;
    return {title,speaker,body:body.slice(0,160),opts};
  }catch(_){return null;}
}
/* 稳健提取模型返回中的 JSON：容忍 ```代码块```、JSON 前后多余文字/思考过程，按大括号配平截取 */
function llmBalanced(s,i){
  let depth=0,inStr=false,esc=false;
  for(let k=i;k<s.length;k++){
    const c=s[k];
    if(inStr){if(esc)esc=false;else if(c==='\\')esc=true;else if(c==='"')inStr=false;}
    else{if(c==='"')inStr=true;else if(c==='{')depth++;else if(c==='}'){if(--depth===0)return s.slice(i,k+1);}}
  }
  return null;
}
function llmParseEvents(text){
  const s=String(text||'').replace(/```json/gi,'').replace(/```/g,'');
  let from=0,i,fallback=null;
  while((i=s.indexOf('{',from))>=0){
    from=i+1;
    const obj=llmBalanced(s,i);
    if(!obj)continue;
    try{const j=JSON.parse(obj);
      if(j&&Array.isArray(j.events))return j;
      if(j&&!fallback)fallback=j;
    }catch(_){}
  }
  return fallback;
}

{"events":[{"title":"≤8字","speaker":"从[${Object.keys(LLM_SPEAKERS).join('，')}]中选一","body":"30~140字，半文半白，以情境或奏报口吻呈现一个具体两难","opts":[{"txt":"≤12字抉择","fx":{"t":0,"p":0,"m":0,"a":0},"f":{"gentry":[0,0]},"result":"≤60字后果"},{"txt":"…","fx":{},"result":"…"}]}]}

【硬性规则】
- t国库 p民心 m军备 a皇权，整数，无变化的键省略；每个选项至少影响1个维度，且要有真实代价
- f可省略；若有，键只能是gentry/scholar/eunuch/consort/army之一，值为[势力增减,恭顺增减]各±8内
- 涉外交事件可加r；键只能是di北狄/zhao南诏/hai海东之一，值为[邦交增减±10内,国势增减±6内]
- 恰好2个opts，两难取舍；不出现真实历史人名朝代名`;
  const text=await llmCall([{role:'user',content:prompt}]);
  const j=llmParseEvents(text);
  if(!j){console.warn('[LLM] 事件JSON解析失败，原始返回：',text);throw new Error('bad json');}
  const out=[];
  (j.events||[]).slice(0,3).forEach(e=>{const v=validateEv(e,sev.cap);if(v)out.push(v);});
  return out;
}
function llmMaybeGen(){
  cardCount++;
  if(typeof fetch==='undefined')return;
  if(llmHardOff){if(cardCount%25!==0)return;llmHardOff=false;if(S)S.llmFail=0;}
  if(!S||S.llmQ.length>=3||S.llmBusy)return;
  S.llmBusy=true;llmStatus('busy');
  genBatch().then(evs=>{
    if(!S)return;
    S.llmBusy=false;
    if(evs&&evs.length){S.llmQ.push(...evs);S.llmFail=0;llmStatus('on');}
    else{S.llmFail++;if(S.llmFail>=3){llmHardOff=true;llmStatus('off');}else llmStatus('on');}
  }).catch(()=>{
    if(!S)return;
    S.llmBusy=false;S.llmFail++;
    if(S.llmFail>=3)llmHardOff=true;
    llmStatus('off');
  });
}
function buildLLMCard(e){
  let sp;
  if(e.speaker==='大臣'){
    const m=pick(S.ministers.filter(x=>x.office))||pick(S.ministers);
    sp=m?spkMin(m):NARRATOR();
  }else if(e.speaker==='妃嫔'&&S.consorts.length){
    const c=S.consorts[S.consorts.length-1];
    sp=spk('lady',c.rank+c.name,'自后宫来');
  }else{
    sp=spk(LLM_SPEAKERS[e.speaker]||'civil');
  }
  S.recentTitles.push(e.title);if(S.recentTitles.length>12)S.recentTitles.shift();
  return {kind:'choice',seasonal:true,title:e.title,sp,body:e.body,ctx:{},
    opts:e.opts.map(o=>({txt:o.txt,fx:o.fx,result:o.result,log:e.title+'——'+o.txt+'。'}))};
}
function llmChronicle(emp,temple,shi,avg,chron){
  const fill=t=>{chron.text=t;const el=document.getElementById('chron-slot');if(el)el.textContent='史官曰：'+t;};
  const fallback=()=>fill(avg>60?'承平之世，守文之主，可谓贤矣。':avg>40?'功过相半，毁誉参差，盖守成之常主也。':'政荒于上，怨积于下，衰乱之萌，肇于此矣。');
  if(typeof fetch==='undefined'||llmHardOff||(S&&S.llmFail>=3)){setTimeout(fallback,300);return;}
  const reign=S.log.filter(l=>l.cls==='big'||l.cls==='bad').slice(-8).map(l=>l.text).join('');
  const prompt=`你是大雍王朝太史令。为大行皇帝写"史官曰"盖棺之论：文言，两句，60字内，客观而有褒贬，不空泛。\n庙号${temple}，谥${shi}，在位${emp.reignYears}年，享年${emp.age}。在位大事：${reign||'无大事可记'}。治世均值（百分制）：${Math.round(avg)}。\n只输出评语正文。`;
  llmCall([{role:'user',content:prompt}]).then(t=>{
    t=String(t||'').replace(/^史官曰[：:]?\s*/,'').replace(/["「」"]/g,'').trim().slice(0,90);
    if(t.length>=10)fill(t);else fallback();
  }).catch(fallback);
}

/* ---------- 召对 ---------- */
let sheetM=null,sheetHist=[],sheetBusy=false;
function sheetMsg(cls,txt){
  const log=$('#sheet-log');
  const d=document.createElement('div');d.className='msg '+cls;
  d.innerHTML=`<div class="bub">${esc(txt)}</div>`;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
  return d;
}
function openSheet(m){
  if(!S||!S.ministers.includes(m))return;
  sheetM=m;sheetHist=[];
  $('#sheet').classList.add('on');
  $('#sheet-head .sh-p').innerHTML=minPortrait(m);
  $('#sheet-head .sh-n').textContent=m.name;
  $('#sheet-head .sh-m').textContent=`${m.office?OFFICES[m.office].name+' · ':''}${fname(m.faction)} · 年${m.age} · 才具${starStr(m.talent)}`;
  $('#sheet-log').innerHTML='';
  sheetMsg('sys',`召${m.name}入对。垂询国事、试探心迹，皆可。\n（其人所言，未必句句是实——忠奸自辨）`);
  $('#ask-input').value='';
}
function closeSheet(){$('#sheet').classList.remove('on');sheetM=null;}
async function ask(){
  if(sheetBusy||!sheetM||!S)return;
  const q=$('#ask-input').value.trim();
  if(!q)return;
  $('#ask-input').value='';
  sheetMsg('me',q);
  if(typeof fetch==='undefined'||llmHardOff||S.llmFail>=3){
    sheetMsg('him','臣……臣愚钝，一时语塞。\n（离线·静态模式下，召对暂不可用）');return;
  }
  sheetBusy=true;$('#ask-btn').disabled=true;
  const wait=sheetMsg('sys','……');
  const m=sheetM;
  const persona=`你扮演架空唐风王朝"大雍"的大臣${m.name}：${m.office?OFFICES[m.office].name:'候补散官'}，${fname(m.faction)}出身，年${m.age}，才具${m.talent}/10，忠诚${m.loyalty}/100（${loyaltyTxt(m)}），野心${m.ambition}/100（${ambitionTxt(m)}）。
皇帝召你入对。当前局面：${stateDigest()}
行为规则：忠诚低者敷衍粉饰、避重就轻甚至撒谎邀宠；忠诚高者直言不讳哪怕逆耳；野心高者自我标榜、暗踩政敌；涉及本派系（${fname(m.faction)}）之弊必回护。绝不跳出角色，不提"游戏"。
半文半白作答，80字以内，称陛下，自称${m.faction==='eunuch'?'老奴':'臣'}。${sheetHist.length?'此前问答：'+sheetHist.map(h=>`帝问"${h.q}"，你答"${h.a}"`).join('；')+'。':''}
陛下问："${q}"`;
  try{
    let t=await llmCall([{role:'user',content:persona}]);
    t=String(t||'').trim().slice(0,180);
    wait.remove();
    if(!t)t='臣……容臣细思，改日具本回奏。';
    sheetMsg('him',t);
    sheetHist.push({q:q.slice(0,24),a:t.slice(0,36)});
    if(sheetHist.length>3)sheetHist.shift();
  }catch(e){
    wait.remove();
    sheetMsg('him','（殿外朔风骤起，对答之声没于风中……再问一次试试）');
    S.llmFail++;if(S.llmFail>=3){llmHardOff=true;llmStatus('off');}
  }
  sheetBusy=false;$('#ask-btn').disabled=false;
}
