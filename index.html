let panelTab='court';
function openPanel(){if(!S)return;$('#panel').classList.add('on');renderPanel();}
function closePanel(){$('#panel').classList.remove('on');}
function renderPanel(){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('on',t.dataset.pt===panelTab));
  const b=$('#panel-body');
  if(panelTab==='court')b.innerHTML=panelCourt();
  else if(panelTab==='pal')b.innerHTML=panelPal();
  else if(panelTab==='realm')b.innerHTML=panelRealm();
  else if(panelTab==='quest')b.innerHTML=panelQuest();
  else b.innerHTML=panelHist();
  b.querySelectorAll('.ro[data-mid]').forEach(el=>{
    el.addEventListener('click',()=>{const m=S.ministers.find(x=>String(x.id)===el.dataset.mid);if(m)openSheet(m);});
  });
  if(panelTab==='hist')b.scrollTop=b.scrollHeight;
}
function panelCourt(){
  let h='<h3 class="sec">派系</h3>';
  topFactions().forEach(F=>{
    const f=FACTIONS[F.key];
    h+=`<div class="fac-row"><div class="fac-top"><span class="fac-name" style="color:${f.hex}">${f.name}</span><span style="font-size:10.5px;color:var(--ink-faint)">${f.desc}${F.plot>=5?'<span class="fac-tag">暗流涌动</span>':''}</span></div>
    <div class="fbar"><span>势力</span><div class="track"><i style="width:${Math.round(F.power)}%;background:${f.hex}"></i></div><span>${Math.round(F.power)}</span></div>
    <div class="fbar"><span>恭顺</span><div class="track"><i style="width:${Math.round(F.attitude)}%;background:${F.attitude<30?'#c0443a':'#8a7340'}"></i></div><span>${Math.round(F.attitude)}</span></div></div>`;
  });
  h+='<h3 class="sec">七职在朝</h3><div class="roster">';
  OKEYS.forEach(o=>{
    const m=officer(o);
    if(m)h+=`<div class="ro" data-mid="${m.id}"><div class="ro-p">${minPortrait(m)}</div><div><div class="ro-t">${OFFICES[o].name}</div><div class="ro-n">${esc(m.name)}</div><div class="ro-m"><span class="stars">${starStr(m.talent)}</span><br>${loyaltyTag(m)} · ${ambitionTag(m)}</div></div></div>`;
    else h+=`<div class="ro" style="opacity:.55;cursor:default"><div class="ro-p"></div><div><div class="ro-t">${OFFICES[o].name}</div><div class="ro-n">虚位</div><div class="ro-m">待吏部呈名单</div></div></div>`;
  });
  h+='</div><h3 class="sec">候补之臣</h3><div class="roster">';
  const cands=S.ministers.filter(m=>!m.office);
  if(!cands.length)h+='</div><div class="small-dim">候补乏人</div>';
  else{cands.forEach(m=>{h+=`<div class="ro" data-mid="${m.id}"><div class="ro-p">${minPortrait(m)}</div><div><div class="ro-t">${fname(m.faction)}</div><div class="ro-n">${esc(m.name)}</div><div class="ro-m"><span class="stars">${starStr(m.talent)}</span> 年${m.age}<br>${loyaltyTag(m)}</div></div></div>`;});h+='</div>';}
  h+='<div class="small-dim">点任一臣子，可召对垂询</div>';
  return h;
}
function panelPal(){
  const e=S.emperor;
  let h='<h3 class="sec">天子</h3>';
  h+=`<div class="pal-card"><b class="kai">${esc(e.name)}</b>　春秋${cn(e.age)}<div class="pal-sub">圣体${e.health<25?'危笃':e.health<45?'欠安':e.health<70?'平平':'康健'} ｜ 在位${e.reignYears}年 ｜ 大雍第${cn(S.gen)}代${S.flags.regency?` ｜ ${S.flags.regency.kind}摄政`:''}</div></div>`;
  h+='<h3 class="sec">后宫</h3>';
  if(!S.consorts.length)h+='<div class="small-dim">后宫虚设</div>';
  S.consorts.forEach(c=>{h+=`<div class="pal-card">${esc(c.rank+c.name)}<span class="pal-sub">　出身${fname(c.faction)}</span></div>`;});
  h+='<h3 class="sec">皇嗣</h3>';
  if(!S.princes.length)h+='<div class="small-dim">尚无皇子——国本未立，不可不虑</div>';
  S.princes.forEach(p=>{
    h+=`<div class="pal-card">${esc(p.name)}　${cn(p.age)}岁 ${p.crown?'<span class="crown">皇太子</span>':''}<div class="pal-sub">才具${starStr(p.talent)} ｜ 体格${p.health<40?'孱弱':p.health<70?'平平':'康健'}${(p.scheming||0)>=3?' ｜ <span class="tag-warn">门下宾客如市</span>':''}</div></div>`;

function panelRealm(){
  let h='';
  if(S.war){
    const W=S.war;
    h+='<h3 class="sec">兵事</h3>';
    h+=`<div class="pal-card"><b class="kai">征${rname(W.k)}</b>　${W.year>0?'兵连'+cn(W.year)+'年':'兵端方启'}<div class="pal-sub">战局：${warScoreTxt()} ｜ 馈饷岁耗不赀，久战伤民</div></div>`;
  }
  h+='<h3 class="sec">四夷邦交</h3>';
  RKEYS.forEach(k=>{
    const R=S.realms[k],D=REALMS[k];

    if(R.war)tags.push('<span class="tag-warn">交兵</span>');
    if(R.tribute)tags.push('<span class="crown">称藩</span>');
    if(R.market)tags.push('互市');
    if(!R.war&&R.truce>0)tags.push('休兵之约');

    <div class="fbar"><span>国势</span><div class="track"><i style="width:${Math.round(R.might)}%;background:${D.hex}"></i></div><span>${mightTxt(R.might)}</span></div></div>`;
  });
  h+='<div class="small-dim">邦交随岁月消长：亲睦则市利岁入，交恶则边衅战端。互市、称藩各岁入+1</div>';
  return h;

function panelQuest(){
  let h='<h3 class="sec">当前国策</h3>';
  if(S.quest){const Q=QUESTS[S.quest.id];
    h+=`<div class="pal-card"><b class="kai">${Q.name}</b>　第${cn(S.quest.stage+1)}幕／共${cn(Q.stages.length)}幕<div class="pal-sub">下一幕：${Q.stages[S.quest.stage]?Q.stages[S.quest.stage].t:'功成在即'} ｜ ${S.quest.timer>0?'约'+S.quest.timer+'年后呈进':'近期呈进'}</div></div>`;
  }else h+=`<div class="small-dim">${S.questCool>0?'国策方歇，且待时机':'时机未至——局面合宜时，自有人上疏'}</div>`;
  h+='<h3 class="sec">已成之策</h3>';
  const done=Object.keys(S.questsDone);
  if(!done.length)h+='<div class="small-dim">尚无功成之国策</div>';
  done.forEach(id=>{const Q=QUESTS[id];if(Q)h+=`<div class="pal-card"><b class="kai">${Q.name}</b>　<span class="crown">${Q.doneTxt}</span></div>`;});
  h+='<div class="small-dim">国策由朝臣上疏开启，逐幕推进，可成可败</div>';
  return h;
}
function panelHist(){
  let h='<h3 class="sec">编年史</h3><div class="hist">';
  let lastY='';
  S.log.slice(-160).forEach(l=>{
    const y=l.era+yearCn(l.eraYear)+'年';
    if(y!==lastY){h+=`<div class="h-year">${y}</div>`;lastY=y;}
    h+=`<div class="h-item ${l.cls}">${esc(l.text)}</div>`;
  });
  return h+'</div>';
}

function showScreen(o){
  const sc=$('#screen');
  sc.innerHTML=`<div class="sc-glyph kai ${o.gold?'gold':''}">${esc(o.glyph||'')}</div>
   <h1 class="kai">${esc(o.title||'')}</h1>
   <div class="sc-sub">${esc(o.sub||'')}</div>
   <div class="sc-body">${esc(o.body||'')}</div>
   ${o.chron?'<div id="chron-slot" class="small-dim" style="max-width:480px">太史令秉笔……</div>':''}
   ${o.extraHTML||''}
   <button class="btn" id="sc-btn">${esc(o.btn||'继续')}</button>`;
  sc.classList.add('on');sc.scrollTop=0;
  $('#sc-btn').onclick=()=>{o.cb&&o.cb();};
  if(o.chron&&o.chron.text){const el=document.getElementById('chron-slot');if(el)el.textContent='史官曰：'+o.chron.text;}
}
function hideScreen(){$('#screen').classList.remove('on');}

let META={endings:{},best:{years:0,gens:0},runs:0,quests:{}};
let metaOK=false;
async function metaLoad(){
  metaOK=true;
  try{
    const v=await kvGet('dy2-meta');
    if(v){
      const j=JSON.parse(v);
      META.endings=j.endings||{};META.best=j.best||{years:0,gens:0};
      META.runs=j.runs||0;META.quests=j.quests||{};
    }
  }catch(e){}
}
function metaSave(){
  if(!metaOK)return;
  kvSet('dy2-meta',JSON.stringify(META));
}
function metaTouch(){
  if(S){if(S.score.years>META.best.years)META.best.years=S.score.years;
    if(S.score.gens>META.best.gens)META.best.gens=S.score.gens;}
  metaSave();
}
function metaEnd(type){META.endings[type]=(META.endings[type]||0)+1;META.runs++;metaTouch();}
function metaQuest(id){META.quests[id]=1;metaSave();}

const CODEX=[['t','空','府库枯竭'],['p','火','万民倒戈'],['m','破','神京陷落'],['a','禅','权臣受禅'],['deposed','废','幼帝见废']];
function titleScreen(){
  gameLive=false;
  let cdx='<div id="codex">';
  CODEX.forEach(([k,g,t])=>{const n=META.endings[k]||0;
    cdx+=`<div class="cdx ${n?'':'locked'}"><div class="cdx-g">${n?g:'？'}</div><div class="cdx-t">${n?t+' ×'+n:'未见之亡'}</div></div>`;});
  Object.keys(QUESTS).forEach(id=>{const got=META.quests[id];const Q=QUESTS[id];
    cdx+=`<div class="cdx ${got?'':'locked'}"><div class="cdx-g"${got?' style="color:var(--gold-bright)"':''}>${got?Q.glyph:'？'}</div><div class="cdx-t">${got?Q.doneTxt:'国策未竟'}</div></div>`;});
  cdx+='</div>';
  const best=META.runs?`<div class="small-dim">最长国祚 ${META.best.years} 年 ｜ 最多 ${META.best.gens} 代 ｜ 凡 ${META.runs} 朝</div>`:'<div class="small-dim">尚无前朝旧事</div>';
  showScreen({glyph:'雍',gold:1,title:'大雍 · 社稷',sub:'贰 · 万机决于一掷',
    body:'四海初定：强藩在外，世族在朝，宦寺在侧，外戚在户。\n章奏如山，而朱笔只分左右——每一掷，都有人记在心里。\n\n四维任一归零，社稷倾覆。上滑可览国势，点臣子画像可召对。',
    extraHTML:cdx+best+'<button class="btn ghost" id="cfg-open-btn">接口设置</button>',btn:'上　朝',
    cb:()=>{hideScreen();startRun();}});
  const ob=document.getElementById('cfg-open-btn');if(ob)ob.onclick=openCfg;
}
function startRun(){
  newGame();
  gameLive=true;
  llmStatus(llmHardOff?'off':'on');
  renderTop();
  drawNext();
}
function init(){
  $('#pull').addEventListener('click',openPanel);
  $('#panel').addEventListener('click',e=>{if(e.target&&e.target.id==='panel')closePanel();});
  document.querySelectorAll('.ptab').forEach(t=>t.addEventListener('click',()=>{panelTab=t.dataset.pt;renderPanel();}));
  $('#sheet-close').addEventListener('click',closeSheet);
  $('#cfg-close').addEventListener('click',closeCfg);
  $('#cfg').addEventListener('click',e=>{if(e.target&&e.target.id==='cfg')closeCfg();});
  $('#cfg-test').addEventListener('click',cfgTest);
  $('#cfg-save').addEventListener('click',cfgSave);
  document.querySelectorAll('#cfg .seg').forEach(x=>x.addEventListener('click',()=>{cfgRead();LLM.fmt=x.dataset.fmt;cfgPaint();}));
  $('#llm-dot').addEventListener('click',openCfg);
  $('#sheet').addEventListener('click',e=>{if(e.target&&e.target.id==='sheet')closeSheet();});
  $('#ask-btn').addEventListener('click',ask);
  $('#ask-input').addEventListener('keydown',e=>{if(e.key==='Enter')ask();});
  $('#ch-l').addEventListener('click',()=>tapChoice(0));
  $('#ch-r').addEventListener('click',()=>tapChoice(1));
  document.addEventListener('keydown',e=>{
    if($('#screen').classList.contains('on')){if(e.key==='Enter'){const b=document.getElementById('sc-btn');if(b&&b.onclick)b.onclick();}return;}
    if($('#sheet').classList.contains('on')||$('#panel').classList.contains('on')||$('#cfg').classList.contains('on'))return;
    if(e.key==='ArrowLeft')tapChoice(0);
    else if(e.key==='ArrowRight')tapChoice(1);
  });
  Promise.all([metaLoad(),cfgLoad()]).then(titleScreen).catch(titleScreen);
}
if(typeof document!=='undefined'&&document.body&&document.body.appendChild)init();
